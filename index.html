        rels.push({
          id: r.id,

      var r1 = await sb.from("task_relations").select("*").in("from_task_id", taskIds);
      var r2 = await sb.from("task_relations").select("*").in("to_task_id", taskIds);
      (r1.data || []).forEach(mergeRel);
      (r2.data || []).forEach(mergeRel);
      var cRes = await sb.from("task_comments").select("*").in("task_id", taskIds);
      (cRes.data || []).forEach(function (c) {

          body: c.body || "",

  async function flushSaveToSupabase() {

      var pi;

        var p = state.projects[pi];
        var ownerId = projectOwnerIds[p.id] || uid;
        var extra = projectExtraFromProj(p);
        extra.members = p.members || [];
        extra.owner = p.owner || "";
        await __sb.from("projects").upsert({
          id: p.id,

        await __sb.from("project_members").upsert(
          { project_id: p.id, user_id: uid, role: role },
          { onConflict: "project_id,user_id" }
        );
      }
      var ti;
      for (ti = 0; ti < state.tasks.length; ti++) {
        await __sb.from("tasks").upsert(taskRowFromTask(state.tasks[ti]));
      }
      for (pi = 0; pi < state.projects.length; pi++) {
        var pid = state.projects[pi].id;
        var want = state.tasks
          .filter(function (t) {
            return t.projectId === pid;
          })
          .map(function (t) {
            return t.id;
          });
        var existRes = await __sb.from("tasks").select("id").eq("project_id", pid);
        var ej = existRes.data || [];
        for (var ei = 0; ei < ej.length; ei++) {
          if (want.indexOf(ej[ei].id) === -1) {
            await __sb.from("tasks").delete().eq("id", ej[ei].id);
          }
        }
      }
      var tids = state.tasks.map(function (t) {
        return t.id;

      if (tids.length) {
        await __sb.from("task_relations").delete().in("from_task_id", tids);
        await __sb.from("task_relations").delete().in("to_task_id", tids);
        await __sb.from("task_comments").delete().in("task_id", tids);
      }
      for (var ri = 0; ri < state.relations.length; ri++) {
        var rr = state.relations[ri];
        if (tids.indexOf(rr.fromId) === -1 || tids.indexOf(rr.toId) === -1) continue;
        await __sb.from("task_relations").upsert({
          id: rr.id,
          from_task_id: rr.fromId,
          to_task_id: rr.toId,
          kind: rr.kind || "related",
        });
      }
      for (var ci = 0; ci < state.comments.length; ci++) {
        var cc = state.comments[ci];

        await __sb.from("task_comments").upsert({
          id: cc.id,
          task_id: cc.taskId,
          author: cc.author || "",
          body: cc.body || "",
          parent_id: cc.parentId || null,

  function isPrivateLanHostname(h) {
    if (!h || h === "localhost") return false;
    var m = /^(\d+)\.(\d+)\.(\d+)\.(\d+)$/.exec(h);
    if (!m) return false;
    var a = parseInt(m[1], 10);
    var b = parseInt(m[2], 10);

  /**
   * API 根地址。优先级：window.API_BASE → localStorage workgraph_api_base →
   * 公网静态站（task-ops-static.vercel.app）→ 同主机 :3780 启发式（本地 task-server）。
   */
  function apiBase() {
    if (typeof window.API_BASE === "string") {
      if (window.API_BASE === "") return "";
      if (window.API_BASE.length) return window.API_BASE.replace(/\/$/, "");
    }
    try {
      var ls = localStorage.getItem("workgraph_api_base");
      if (ls && String(ls).trim()) return String(ls).trim().replace(/\/$/, "");
    } catch (e0) {}
    try {
      var pr = location.protocol;
      if (pr !== "http:" && pr !== "https:") return "";
      var h = location.hostname;
      if (h === "task-ops-static.vercel.app") {
        if (typeof window.WORKGRAPH_SYNC_API === "string" && window.WORKGRAPH_SYNC_API.trim()) {
          return window.WORKGRAPH_SYNC_API.trim().replace(/\/$/, "");
        }
        // 与 Next.js（/api）同域部署时：用相对路径。若 API 在别的域名，请在控制台设置：
        // localStorage.setItem("workgraph_api_base","https://你的后端根地址")
        return "";
      }
      var loopback = h === "localhost" || h === "127.0.0.1" || h === "[::1]" || h === "::1";
      var lan = isPrivateLanHostname(h);
      if (!loopback && !lan) return "";
      var hostForApi = h === "[::1]" || h === "::1" ? "127.0.0.1" : h;
      var port = location.port;
      if (port === "3780") return "";
      if (!port || port === "80" || port === "443") {
        return pr + "//" + hostForApi + ":3780";
      }
      var n = parseInt(port, 10);
      if (n === 3780) return "";
      return pr + "//" + hostForApi + ":3780";
    } catch (e) {
      return "";
    }
  }

  function apiFetch(path, opts) {
    opts = opts || {};
    opts.credentials = "include";
    opts.headers = opts.headers || {};
    try {
      if (path.indexOf("/api/") === 0) {
        var wb = localStorage.getItem(WORKGRAPH_BEARER_KEY);
        if (wb && String(wb).trim()) {
          opts.headers["Authorization"] = "Bearer " + String(wb).trim();
        }
      }
    } catch (e) {}
    if (opts.body != null && typeof opts.body === "object" && !(opts.body instanceof FormData)) {
      opts.headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(opts.body);
    }
    return fetch(apiBase() + path, opts);
  }

  function applyRealtimeSnapshotToState(payload) {
    if (!state || !payload || !payload.project) return;
    var pid = payload.projectId || payload.project.id;
    if (!pid) return;
    var oldTaskIds = {};
    var i;
    for (i = 0; i < state.tasks.length; i++) {
      var tx = state.tasks[i];
      if (tx.projectId === pid) oldTaskIds[tx.id] = true;
    }
    state.tasks = state.tasks.filter(function (t) {
      return t.projectId !== pid;
    });
    state.relations = state.relations.filter(function (r) {
      if (oldTaskIds[r.fromId] || oldTaskIds[r.toId]) return false;
      return true;
    });
    state.comments = state.comments.filter(function (c) {
      if (oldTaskIds[c.taskId]) return false;
      return true;
    });
    var projLocal = state.projects.find(function (p) {
      return p.id === pid;
    });
    var incomingProj = JSON.parse(JSON.stringify(payload.project));
    incomingProj.realtimeSync = true;
    if (projLocal) {
      Object.assign(projLocal, incomingProj);
    } else {
      state.projects.push(incomingProj);
    }
    if (payload.tasks) {
      for (i = 0; i < payload.tasks.length; i++) {
        state.tasks.push(JSON.parse(JSON.stringify(payload.tasks[i])));
      }
    }
    if (payload.relations) {
      for (i = 0; i < payload.relations.length; i++) {
        state.relations.push(JSON.parse(JSON.stringify(payload.relations[i])));
      }
    }
    if (payload.comments) {
      for (i = 0; i < payload.comments.length; i++) {
        state.comments.push(JSON.parse(JSON.stringify(payload.comments[i])));
      }
    }
    if (payload.version != null) __rtVersions[pid] = payload.version;
    ensureChainProjectsMigration(state);
    migrateStateObject(state);
    fixCurrentProjectPointer(state);
    __lastSavedStateJson = null;
  }

  function connectRealtimeSocket() {
    if (!useServerStorage() || typeof io === "undefined") return;
    if (__socket && __socket.connected) {
      resubscribeRealtimeProjects();

    }
    if (__socket) {
      try {
        __socket.disconnect();
      } catch (e1) {}
      __socket = null;

    var origin = apiBase() ? apiBase().replace(/\/$/, "") : window.location.origin;
    __socket = io(origin, { withCredentials: true, path: "/socket.io", transports: ["websocket", "polling"] });
    __socket.on("connect", function () {

  /** 跨域 API 在 iOS Safari 上常无法保存 Cookie；登录接口同时返回 token，存本地并用 Authorization 携带 */
  var WORKGRAPH_BEARER_KEY = "workgraph_bearer_token";
  function persistWorkgraphTokenFromResponse(data) {
    if (data && data.token && String(data.token).trim()) {
      try {
        localStorage.setItem(WORKGRAPH_BEARER_KEY, String(data.token).trim());

  function migrateStateObject(o) {
    if (o.view === "workspace") o.view = "projects";
    if (o.view === "my") o.view = "dashboard";
    if (o.workspaceTab === "calendar") o.workspaceTab = "flow";
    if (o.showFlowOverlay === undefined) o.showFlowOverlay = false;
    if (o.scheduleWeekOffset === undefined) o.scheduleWeekOffset = 0;
    if (o.scheduleProjectFilter === undefined) o.scheduleProjectFilter = "";
    if (o.avatar === undefined) o.avatar = "👤";
    if (o.profileTitle === undefined) o.profileTitle = "";
    if (o.profileBio === undefined) o.profileBio = "";
    if (o.projects && o.projects.length) {
      for (var pi = 0; pi < o.projects.length; pi++) {
        var op = o.projects[pi];
        if (!op.owner) op.owner = o.userName || "未命名";
        if (!Array.isArray(op.members)) op.members = [op.owner];
        if (op.members.indexOf(op.owner) === -1) op.members.unshift(op.owner);
        if (op.chainMode) {
          op.pipelineStages = [];
        } else if (!op.pipelineStages || !op.pipelineStages.length) {
          op.pipelineStages = ["流程"];
        }
      }
    }
    if (o.tasks && o.tasks.length) {
      for (var ti = 0; ti < o.tasks.length; ti++) {
        var task = o.tasks[ti];
        if (task.pipelineStage === undefined || task.pipelineStage === null) task.pipelineStage = 0;
        var pr = o.projects && o.projects.filter(function (x) {
          return x.id === task.projectId;
        })[0];
        if (pr && pr.chainMode) {
          task.pipelineStage = 0;
        } else if (pr && pr.pipelineStages && pr.pipelineStages.length) {
          var mx = pr.pipelineStages.length - 1;
          if (task.pipelineStage > mx) task.pipelineStage = mx;
        }
      }
    }
    ensureChainProjectsMigration(o);
    return o;
  }

  function ensureChainProjectsMigration(o) {
    if (!o.projects || !o.tasks || !o.tasks.length) return;
    for (var pi = 0; pi < o.projects.length; pi++) {
      var proj = o.projects[pi];
      if (!proj.chainMode) continue;
      var roots = o.tasks.filter(function (t) {
        return t.projectId === proj.id && !t.parentId;
      });
      roots.sort(function (a, b) {
        var ao = a.chainOrder != null ? a.chainOrder : 999999;
        var bo = b.chainOrder != null ? b.chainOrder : 999999;
        if (ao !== bo) return ao - bo;
        return String(a.id).localeCompare(String(b.id));
      });
      for (var ri = 0; ri < roots.length; ri++) {
        roots[ri].chainOrder = ri;
        roots[ri].pipelineStage = 0;
      }
    }
  }

  function fixCurrentProjectPointer(o) {
    if (!o || !o.projects || o.projects.length === 0) return;
    var ok = o.projects.some(function (p) {
      return p.id === o.currentProjectId;
    });
    if (!ok) {
      o.currentProjectId = o.projects[0].id;
    }
  }

  function utf8ToB64(s) {
    try {
      return btoa(unescape(encodeURIComponent(String(s))));
    } catch (e) {
      return "";
    }
  }
  function b64ToUtf8(s) {
    try {
      return decodeURIComponent(escape(atob(String(s))));
    } catch (e) {
      return "";
    }
  }

  function buildProjectShareBundle(projectId) {
    var proj = state.projects.find(function (p) {
      return p.id === projectId;
    });
    if (!proj) return null;
    var tids = {};
    var tasks = [];
    var i;
    for (i = 0; i < state.tasks.length; i++) {
      var t = state.tasks[i];
      if (t.projectId === projectId) {
        tasks.push(JSON.parse(JSON.stringify(t)));
        tids[t.id] = true;
      }
    }
    var relations = [];
    for (i = 0; i < state.relations.length; i++) {
      var rel = state.relations[i];
      if (tids[rel.fromId] && tids[rel.toId]) {
        relations.push(JSON.parse(JSON.stringify(rel)));
      }
    }
    var comments = [];
    for (i = 0; i < state.comments.length; i++) {
      var com = state.comments[i];
      if (tids[com.taskId]) comments.push(JSON.parse(JSON.stringify(com)));
    }
    return {
      v: 1,
      fromUser: state.userName,
      exportedAt: new Date().toISOString(),
      project: JSON.parse(JSON.stringify(proj)),
      tasks: tasks,
      relations: relations,
      comments: comments,
    };
  }

  function encodeProjectShareString(projectId) {
    var b = buildProjectShareBundle(projectId);
    if (!b) return "";
    return "WGSHARE1:" + utf8ToB64(JSON.stringify(b));
  }

  function decodeShareBundleInput(raw) {
    var s = String(raw || "").trim();
    if (!s) return { err: "请输入分享码" };
    var jsonStr = "";
    if (s.indexOf("WGSHARE1:") === 0) {
      jsonStr = b64ToUtf8(s.slice(9));
      if (!jsonStr) return { err: "分享码解码失败，请粘贴完整内容" };
    } else if (s.charAt(0) === "{") {
      jsonStr = s;
    } else {
      jsonStr = b64ToUtf8(s);
      if (!jsonStr) return { err: "无法解析。完整分享码应以 WGSHARE1: 开头" };
    }
    try {
      var o = JSON.parse(jsonStr);
      if (o.v !== 1 || !o.project || !Array.isArray(o.tasks)) {
        return { err: "不是有效的项目分享数据（需含 project、tasks）" };
      }
      return { bundle: o };
    } catch (e) {
      return { err: "JSON 解析失败" };
    }
  }

  function importSharedBundleIntoState(bundle) {
    var newPid = uid();
    var idMap = {};
    var t = bundle.tasks;
    var i;
    for (i = 0; i < t.length; i++) {
      idMap[t[i].id] = uid();
    }
    var newProj = JSON.parse(JSON.stringify(bundle.project));
    newProj.id = newPid;
    if (!newProj.createdAt) newProj.createdAt = new Date().toISOString();
    state.projects.push(newProj);
    for (i = 0; i < t.length; i++) {
      var ot = t[i];
      var nt = JSON.parse(JSON.stringify(ot));
      nt.id = idMap[ot.id];
      nt.projectId = newPid;
      if (ot.parentId && idMap[ot.parentId]) nt.parentId = idMap[ot.parentId];
      else nt.parentId = null;
      state.tasks.push(nt);
    }
    if (bundle.relations && bundle.relations.length) {
      for (i = 0; i < bundle.relations.length; i++) {
        var r = bundle.relations[i];
        if (!idMap[r.fromId] || !idMap[r.toId]) continue;
        state.relations.push({
          id: uid(),
          fromId: idMap[r.fromId],
          toId: idMap[r.toId],
          kind: r.kind || "related",
        });
      }
    }
    if (bundle.comments && bundle.comments.length) {
      for (i = 0; i < bundle.comments.length; i++) {
        var c = bundle.comments[i];
        if (!idMap[c.taskId]) continue;
        var nc = JSON.parse(JSON.stringify(c));
        nc.id = uid();
        nc.taskId = idMap[c.taskId];
        state.comments.push(nc);
      }
    }
    ensureChainProjectsMigration(state);
    migrateStateObject(state);
    state.currentProjectId = newPid;
    fixCurrentProjectPointer(state);
    return newPid;
  }

  function buildProjectShareBundleFromState(srcState, projectId) {
    if (!srcState || !srcState.projects) return null;
    var proj = srcState.projects.find(function (p) {
      return p.id === projectId;
    });
    if (!proj) return null;
    var tasks = srcState.tasks.filter(function (t) {
      return t.projectId === projectId;
    });
    var tids = {};
    for (var i = 0; i < tasks.length; i++) tids[tasks[i].id] = true;
    var relations = [];
    for (i = 0; i < srcState.relations.length; i++) {
      var rel = srcState.relations[i];
      if (tids[rel.fromId] && tids[rel.toId]) relations.push(JSON.parse(JSON.stringify(rel)));
    }
    var comments = [];
    for (i = 0; i < srcState.comments.length; i++) {
      var com = srcState.comments[i];
      if (tids[com.taskId]) comments.push(JSON.parse(JSON.stringify(com)));
    }
    return {
      v: 1,
      fromUser: srcState.userName,
      exportedAt: new Date().toISOString(),
      project: JSON.parse(JSON.stringify(proj)),
      tasks: tasks.map(function (x) { return JSON.parse(JSON.stringify(x)); }),
      relations: relations,
      comments: comments,
    };
  }

  /** 保留原项目 ID 导入（用于多账号加入同一项目） */
  function importSharedBundleKeepProjectId(bundle) {
    if (!bundle || !bundle.project) return "";
    var pid = bundle.project.id || uid();
    var existingProj = state.projects.find(function (p) {
      return p.id === pid;
    });
    if (existingProj) {
      state.currentProjectId = pid;
      fixCurrentProjectPointer(state);
      return pid;
    }
    var proj = JSON.parse(JSON.stringify(bundle.project));
    proj.id = pid;
    state.projects.push(proj);
    var i;
    for (i = 0; i < bundle.tasks.length; i++) {
      var t = JSON.parse(JSON.stringify(bundle.tasks[i]));
      t.projectId = pid;
      if (!state.tasks.some(function (x) { return x.id === t.id; })) {
        state.tasks.push(t);
      }
    }
    if (bundle.relations && bundle.relations.length) {
      for (i = 0; i < bundle.relations.length; i++) {
        var r = JSON.parse(JSON.stringify(bundle.relations[i]));
        if (state.relations.some(function (x) { return x.id === r.id; })) r.id = uid();
        state.relations.push(r);
      }
    }
    if (bundle.comments && bundle.comments.length) {
      for (i = 0; i < bundle.comments.length; i++) {
        var c = JSON.parse(JSON.stringify(bundle.comments[i]));
        if (state.comments.some(function (x) { return x.id === c.id; })) c.id = uid();
        state.comments.push(c);
      }
    }
    ensureChainProjectsMigration(state);
    migrateStateObject(state);
    state.currentProjectId = pid;
    fixCurrentProjectPointer(state);
    return pid;
  }

  function tryJoinProjectFromOtherAccounts(raw) {
    var auth = loadAuth();
    for (var i = 0; i < auth.accounts.length; i++) {
      var acc = auth.accounts[i];
      if (!acc || !acc.username || acc.username === activeAccount) continue;
      var os = loadStoredStateOfUser(acc.username);
      if (!os || !os.projects) continue;
      var op = os.projects.find(function (p) {
        return p.id === raw || p.name === raw;
      });
      if (!op) continue;
      var bundle = buildProjectShareBundleFromState(os, op.id);
      if (!bundle) continue;
      return { owner: acc.username, bundle: bundle };
    }
    return null;
  }

  function copyTextToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard
        .writeText(text)
        .then(function () {
          return true;
        })
        .catch(function () {
          return fallbackCopy(text);
        });
    }
    return Promise.resolve(fallbackCopy(text));
  }
  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;left:-9999px;top:0";
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand("copy");
      document.body.removeChild(ta);
      return true;
    } catch (e) {
      try {
        document.body.removeChild(ta);
      } catch (e2) {}
      return false;
    }
  }

  function ensureDemoData(o) {
    if (!o) return;
    if (!Array.isArray(o.projects)) o.projects = [];
    if (!Array.isArray(o.tasks)) o.tasks = [];
    if (!Array.isArray(o.relations)) o.relations = [];
    if (!Array.isArray(o.comments)) o.comments = [];
    if (o.currentProjectId === undefined) o.currentProjectId = "";
    if (o.view === undefined) o.view = "dashboard";
    if (o.workspaceTab === undefined) o.workspaceTab = "flow";
    if (o.showFlowOverlay === undefined) o.showFlowOverlay = false;
    if (o.scheduleWeekOffset === undefined) o.scheduleWeekOffset = 0;
    if (o.scheduleProjectFilter === undefined) o.scheduleProjectFilter = "";
  }

  /** 旧存档在演示串联项目里可能缺少「游戏文本翻译与本地化」下的子任务，从模板补全并持久化 */
  function mergeDemoChainSubtasksIfMissing(o) {
    if (!o || !o.tasks || !o.projects) return false;
    var CHAIN_ID = "proj_chain_linear_1";
    var PARENT_ID = "t_ch_2";
    var hasProj = o.projects.some(function (p) {
      return p.id === CHAIN_ID && p.chainMode;
    });
    if (!hasProj) return false;
    if (!o.tasks.some(function (t) { return t.id === PARENT_ID; })) return false;
    var demo = defaultState();
    var added = false;
    for (var i = 0; i < demo.tasks.length; i++) {
      var dt = demo.tasks[i];
      if (dt.projectId !== CHAIN_ID || dt.parentId !== PARENT_ID) continue;
      if (o.tasks.some(function (t) { return t.id === dt.id; })) continue;
      o.tasks.push(JSON.parse(JSON.stringify(dt)));
      added = true;
    }
    if (added) ensureChainProjectsMigration(o);
    return added;
  }

  function postLoadState(o) {
    if (!o) return false;
    ensureDemoData(o);
    var merged = mergeDemoChainSubtasksIfMissing(o);
    fixCurrentProjectPointer(o);
    return merged;
  }

  function loadForUser(username) {
    var key = storageKeyForUser(username);
    try {
      var j = localStorage.getItem(key);
      if (j) {
        var o = migrateStateObject(JSON.parse(j));
        var merged = postLoadState(o);
        if (merged) {
          try {
            localStorage.setItem(key, JSON.stringify(o));
          } catch (e) {}
        }
        return o;
      }
    } catch (e) {}
    var fresh = emptyState(username);
    postLoadState(fresh);
    return fresh;
  }

  function migrateLegacyToUser(username) {
    var leg = localStorage.getItem(LEGACY_STORAGE_KEY);
    if (!leg) return false;
    var key = storageKeyForUser(username);
    if (localStorage.getItem(key)) return false;
    try {
      localStorage.setItem(key, leg);
      localStorage.removeItem(LEGACY_STORAGE_KEY);
      return true;
    } catch (e) {
      return false;
    }
  }

  function syncSavedSnapshotFromState(s) {
    if (!s) {
      __lastSavedStateJson = null;
      return;
    }
    try {
      __lastSavedStateJson = JSON.stringify(s);
    } catch (e1) {
      __lastSavedStateJson = null;
    }
  }

  function save(state) {
    if (!activeAccount || !state) return;
    var json;
    try {
      json = JSON.stringify(state);
    } catch (e) {
      return;
    }
    if (json === __lastSavedStateJson) return;
    if (useSupabaseMode()) {
      __lastSavedStateJson = json;
      if (__applyingRemoteSupabase) return;
      scheduleSupabaseFlush();
      return;
    }
    try {
      localStorage.setItem(storageKeyForUser(activeAccount), json);
    } catch (e2) {}
    __lastSavedStateJson = json;
    if (!useServerStorage() && !__syncingCrossAccountShares) {
      syncCrossAccountProjectShares();
    }
    if (!useServerStorage()) return;
    if (__serverSaveTimer) clearTimeout(__serverSaveTimer);
    __serverSaveTimer = setTimeout(function () {

    }, 450);
    if (!__applyingRemoteRealtime) {
      scheduleRealtimePush();

  function cloneProjectBundleFromState(srcState, projectId) {
    var proj = srcState.projects.find(function (p) {
      return p.id === projectId;
    });
    if (!proj) return null;
    var tasks = srcState.tasks.filter(function (t) {
      return t.projectId === projectId;
    });
    var tids = {};
    for (var i = 0; i < tasks.length; i++) tids[tasks[i].id] = true;
    var relations = srcState.relations.filter(function (r) {
      return tids[r.fromId] && tids[r.toId];
    });
    var comments = srcState.comments.filter(function (c) {
      return tids[c.taskId];
    });
    return {
      project: JSON.parse(JSON.stringify(proj)),
      tasks: tasks.map(function (x) { return JSON.parse(JSON.stringify(x)); }),
      relations: relations.map(function (x) { return JSON.parse(JSON.stringify(x)); }),
      comments: comments.map(function (x) { return JSON.parse(JSON.stringify(x)); }),
    };
  }

  function removeProjectBundleFromState(obj, projectId) {
    var pid = String(projectId || "");
    var taskIds = {};
    for (var i = 0; i < obj.tasks.length; i++) {
      if (obj.tasks[i].projectId === pid) taskIds[obj.tasks[i].id] = true;
    }
    obj.tasks = obj.tasks.filter(function (t) {
      return t.projectId !== pid;
    });
    obj.relations = obj.relations.filter(function (r) {
      return !taskIds[r.fromId] && !taskIds[r.toId];
    });
    obj.comments = obj.comments.filter(function (c) {
      return !taskIds[c.taskId];
    });
    obj.projects = obj.projects.filter(function (p) {
      return p.id !== pid;
    });
    if (obj.currentProjectId === pid) obj.currentProjectId = "";
  }

  /** 本机多账号协作：按任务负责人/协作人（账号ID）自动把项目镜像到对方账号 */
  function syncCrossAccountProjectShares() {
    if (useSupabaseMode()) return;
    if (!activeAccount || !state) return;
    var auth = loadAuth();
    var users = auth.accounts.map(function (a) { return a.username; });
    if (!users.length) return;
    var userSet = {};
    for (var i = 0; i < users.length; i++) userSet[users[i]] = true;
    var desiredByUser = {};
    function markDesired(u, pid) {
      if (!desiredByUser[u]) desiredByUser[u] = {};
      desiredByUser[u][pid] = true;
    }

    for (var pi = 0; pi < state.projects.length; pi++) {
      var p = state.projects[pi];
      if (p.sharedLinked) continue;
      var ts = state.tasks.filter(function (t) { return t.projectId === p.id; });
      var targets = {};
      var members = getProjectMembers(p);
      for (var mi = 0; mi < members.length; mi++) {
        var m = members[mi];
        if (userSet[m] && m !== activeAccount) targets[m] = true;
      }
      for (var ti = 0; ti < ts.length; ti++) {
        var t = ts[ti];
        var asg = String(t.assignee || "").trim();
        if (asg && userSet[asg] && asg !== activeAccount) targets[asg] = true;
        var cols = parseCommaMembers(t.collaborators || "");
        for (var ci = 0; ci < cols.length; ci++) {
          var c = cols[ci];
          if (userSet[c] && c !== activeAccount) targets[c] = true;
        }
      }
      var bundle = cloneProjectBundleFromState(state, p.id);
      if (!bundle) continue;
      var targetUsers = Object.keys(targets);
      for (var tu = 0; tu < targetUsers.length; tu++) {
        var uname = targetUsers[tu];
        markDesired(uname, p.id);
        var o = loadForUser(uname);
        var mirrorId = "share__" + activeAccount + "__" + p.id;
        var mirrorProj = o.projects.find(function (x) {
          return x.id === mirrorId;
        });
        if (!mirrorProj) {
          mirrorProj = {
            id: mirrorId,
            name: bundle.project.name + "（来自 " + activeAccount + "）",
            archived: false,
            createdAt: new Date().toISOString(),
            pipelineStages: [],
            owner: bundle.project.owner || activeAccount,
            members: getProjectMembers(bundle.project),
            sharedLinked: true,
            sharedSourceUser: activeAccount,
            sharedSourceProjectId: p.id,
          };
          o.projects.push(mirrorProj);
        } else {
          mirrorProj.name = bundle.project.name + "（来自 " + activeAccount + "）";
          mirrorProj.archived = !!bundle.project.archived;
          mirrorProj.owner = bundle.project.owner || activeAccount;
          mirrorProj.members = getProjectMembers(bundle.project);
          mirrorProj.sharedLinked = true;
          mirrorProj.sharedSourceUser = activeAccount;
          mirrorProj.sharedSourceProjectId = p.id;
        }
        removeProjectBundleFromState(o, mirrorId);
        o.projects.push(mirrorProj);
        var idMap = {};
        for (var bt = 0; bt < bundle.tasks.length; bt++) {
          idMap[bundle.tasks[bt].id] = mirrorId + "__t__" + bundle.tasks[bt].id;
        }
        for (var nt = 0; nt < bundle.tasks.length; nt++) {
          var srcT = bundle.tasks[nt];
          var cp = JSON.parse(JSON.stringify(srcT));
          cp.id = idMap[srcT.id];
          cp.projectId = mirrorId;
          cp.parentId = srcT.parentId ? idMap[srcT.parentId] : null;
          o.tasks.push(cp);
        }
        for (var br = 0; br < bundle.relations.length; br++) {
          var rr = bundle.relations[br];
          o.relations.push({
            id: uid(),
            fromId: idMap[rr.fromId] || "",
            toId: idMap[rr.toId] || "",
            kind: rr.kind || "related",
          });
        }
        for (var bc = 0; bc < bundle.comments.length; bc++) {
          var cc = bundle.comments[bc];
          o.comments.push({
            id: uid(),
            taskId: idMap[cc.taskId] || "",
            author: cc.author || "",
            body: cc.body || "",
            parentId: null,
            at: Array.isArray(cc.at) ? cc.at.slice() : [],
            createdAt: cc.createdAt || new Date().toISOString(),
          });
        }
        postLoadState(o);
        try {
          __syncingCrossAccountShares = true;
          localStorage.setItem(storageKeyForUser(uname), JSON.stringify(o));
        } catch (e) {
        } finally {
          __syncingCrossAccountShares = false;
        }
      }
    }

    for (var ui = 0; ui < users.length; ui++) {
      var u = users[ui];
      if (u === activeAccount) continue;
      var o2 = loadForUser(u);
      var desired = desiredByUser[u] || {};
      var changed = false;
      var drops = o2.projects.filter(function (p) {
        return p.sharedLinked && p.sharedSourceUser === activeAccount && !desired[p.sharedSourceProjectId];
      });
      for (var di = 0; di < drops.length; di++) {
        removeProjectBundleFromState(o2, drops[di].id);
        changed = true;
      }
      if (changed) {
        postLoadState(o2);
        try {
          __syncingCrossAccountShares = true;
          localStorage.setItem(storageKeyForUser(u), JSON.stringify(o2));
        } catch (e2) {
        } finally {
          __syncingCrossAccountShares = false;
        }
      }
    }
  }

  function weakHash(str) {
    var s = "workgraph_v1|" + str;
    var h = 2166136261;
    for (var i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return "w_" + (h >>> 0).toString(16) + "_" + s.length;
  }

  function sha256Hex(str) {
    if (typeof crypto !== "undefined" && crypto.subtle && typeof crypto.subtle.digest === "function") {
      return crypto.subtle.digest("SHA-256", new TextEncoder().encode(str)).then(function (buf) {
        return Array.from(new Uint8Array(buf))
          .map(function (b) {
            return b.toString(16).padStart(2, "0");
          })
          .join("");
      });
    }
    return Promise.resolve(weakHash(str));
  }

  function esc(s) {
    if (s == null) return "";
    var d = document.createElement("div");
    d.textContent = String(s);
    return d.innerHTML;
  }

  function isAvatarUrl(v) {
    var s = String(v || "").trim();
    return /^https?:\/\//i.test(s) || /^data:image\//i.test(s);
  }

  function initialsOf(name) {
    var n = String(name || "").trim();
    if (!n) return "U";
    return n.slice(0, 1).toUpperCase();
  }

  function renderAvatarInner(value, fallbackName) {
    var v = String(value || "").trim();
    if (!v) v = initialsOf(fallbackName);
    if (isAvatarUrl(v)) {
      return '<img src="' + esc(v) + '" alt="avatar" />';
    }
    return esc(v);
  }

  function fileToDataUrl(file, done) {
    if (!file) return done("");
    var reader = new FileReader();
    reader.onload = function () {
      done(String(reader.result || ""));
    };
    reader.onerror = function () {
      done("");
    };
    reader.readAsDataURL(file);
  }

  function tasksOfProject(state, projectId) {
    return state.tasks.filter(function (t) { return t.projectId === projectId; });
  }

  function parseCommaMembers(raw) {
    var arr = String(raw || "")
      .split(/[,，\n]/)
      .map(function (s) {
        return s.trim();
      })
      .filter(function (s) {
        return s.length > 0;
      });
    var out = [];
    var seen = {};
    for (var i = 0; i < arr.length; i++) {
      if (seen[arr[i]]) continue;
      seen[arr[i]] = true;
      out.push(arr[i]);
    }
    return out;
  }

  function getProjectMembers(proj) {
    if (!proj) return [];
    var names = [];
    var seen = {};
    function pushName(n) {
      var s = String(n || "").trim();
      if (!s || seen[s]) return;
      seen[s] = true;
      names.push(s);
    }
    pushName(proj.owner);
    if (!proj.owner) pushName(state && state.userName);
    if (Array.isArray(proj.members)) {
      for (var i = 0; i < proj.members.length; i++) pushName(proj.members[i]);
    }
    return names;
  }

  function taskDependencyBlockers(task, taskPool) {
    if (!task || !state || !state.relations || !taskPool) return [];
    var byId = {};
    for (var i = 0; i < taskPool.length; i++) {
      byId[taskPool[i].id] = taskPool[i];
    }
    var blockers = [];
    for (var ri = 0; ri < state.relations.length; ri++) {
      var rel = state.relations[ri];
      var b = null;
      if (rel.kind === "depends" && rel.fromId === task.id) {
        b = byId[rel.toId] || null;
      } else if (rel.kind === "blocks" && rel.toId === task.id) {
        b = byId[rel.fromId] || null;
      }
      if (b && b.status !== "done") blockers.push(b);
    }
    return blockers;
  }

  function isTaskAutoBlocked(task, taskPool) {
    return taskDependencyBlockers(task, taskPool).length > 0;
  }

  function computeProjectProgress(projectId) {
    var ts = tasksOfProject(state, projectId);
    var total = ts.length;
    var done = ts.filter(function (t) { return t.status === "done"; }).length;
    var doing = ts.filter(function (t) { return t.status === "doing" || t.status === "review"; }).length;
    var blocked = ts.filter(function (t) {
      return t.status === "blocked" || isTaskAutoBlocked(t, ts);
    }).length;
    var overdue = ts.filter(function (t) { return isOverdue(t); }).length;
    var rate = total ? Math.round((done / total) * 100) : 0;
    return { total: total, done: done, doing: doing, blocked: blocked, overdue: overdue, rate: rate };
  }

  function computeProjectWorkload(projectId) {
    var proj = state.projects.find(function (p) { return p.id === projectId; });
    var members = getProjectMembers(proj);
    var ts = tasksOfProject(state, projectId);
    var rows = [];
    for (var i = 0; i < members.length; i++) {
      var m = members[i];
      var owned = ts.filter(function (t) { return String(t.assignee || "").trim() === m; });
      var collab = ts.filter(function (t) {
        return parseCommaMembers(t.collaborators || "").indexOf(m) !== -1;
      });
      var open = owned.filter(function (t) { return t.status !== "done"; }).length;
      var blocked = owned.filter(function (t) { return t.status === "blocked" || isTaskAutoBlocked(t, ts); }).length;
      rows.push({
        name: m,
        owned: owned.length,
        collab: collab.length,
        open: open,
        blocked: blocked,
        load: open * 2 + blocked * 3,
      });
    }
    rows.sort(function (a, b) { return b.load - a.load; });
    return rows;
  }

  function badgeClass(st) {
    return "badge st-" + (st || "todo");
  }

  function prioClass(p) {
    return "p-" + (p || "P2").toLowerCase();
  }

  function isOverdue(t) {
    if (!t.deadline || t.status === "done") return false;
    var end = new Date(t.deadline);
    var today = new Date();
    end.setHours(0, 0, 0, 0);
    today.setHours(0, 0, 0, 0);
    return end < today;
  }

  function todayYmdFlow() {
    var d = new Date();
    return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
  }

  /** 流程图排序：优先显式 flowOrder，其次截止日（早→晚），再 chainOrder / 标题 */
  function sortTasksByDeadlineFlow(a, b) {
    var afo = a.flowOrder;
    var bfo = b.flowOrder;
    if (afo != null && bfo != null) {
      var afn = Number(afo);
      var bfn = Number(bfo);
      if (!isNaN(afn) && !isNaN(bfn) && afn !== bfn) return afn - bfn;
    }
    var da = a.deadline ? String(a.deadline).slice(0, 10) : "";
    var db = b.deadline ? String(b.deadline).slice(0, 10) : "";
    if (da && db) {
      var c = da.localeCompare(db);
      if (c !== 0) return c;
    } else if (da && !db) return -1;
    else if (!da && db) return 1;
    var ao = a.chainOrder != null ? Number(a.chainOrder) : 999999;
    var bo = b.chainOrder != null ? Number(b.chainOrder) : 999999;
    if (ao !== bo) return ao - bo;
    return String(a.title).localeCompare(String(b.title), "zh");
  }

  function flowDdlStripClass(t) {
    if (t.status === "done") return "fn-ddlstrip fn-ddlstrip-done";
    if (!t.deadline) return "fn-ddlstrip fn-ddlstrip-none";
    var ds = String(t.deadline).slice(0, 10);
    var today = todayYmdFlow();
    if (ds < today) return "fn-ddlstrip fn-ddlstrip-overdue";
    if (ds === today) return "fn-ddlstrip fn-ddlstrip-today";
    var p = ds.split("-");
    var end = new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
    var start = new Date();
    start.setHours(0, 0, 0, 0);
    var diff = (end - start) / 864e5;
    if (diff <= 7 && diff >= 0) return "fn-ddlstrip fn-ddlstrip-soon";
    return "fn-ddlstrip fn-ddlstrip-future";
  }

  function flowDdlStripLabel(t) {
    if (t.status === "done") return "✓ 已完成";
    if (!t.deadline) return "未设截止日";
    return "截止 " + String(t.deadline).slice(0, 10);
  }

  function isChainProject(proj) {
    return !!(proj && proj.chainMode);
  }

  function getProjectStages(proj) {
    if (isChainProject(proj)) return ["串联"];
    if (!proj || !proj.pipelineStages || !proj.pipelineStages.length) return ["流程"];
    return proj.pipelineStages;
  }

  function chainRootTasks(ts, proj) {
    var roots = ts.filter(function (t) {
      return !t.parentId;
    });
    roots.sort(sortTasksByDeadlineFlow);
    return roots;
  }

  function nextChainOrder(projId) {
    var roots = state.tasks.filter(function (t) {
      return t.projectId === projId && !t.parentId;
    });
    var max = -1;
    for (var i = 0; i < roots.length; i++) {
      var c = roots[i].chainOrder;
      if (c != null && c > max) max = c;
    }
    return max + 1;
  }

  function renumberChainAfterDelete(projId) {
    if (!state.projects.find(function (p) {
      return p.id === projId && p.chainMode;
    })) return;
    var roots = state.tasks.filter(function (t) {
      return t.projectId === projId && !t.parentId;
    });
    roots.sort(function (a, b) {
      var ao = a.chainOrder != null ? a.chainOrder : 0;
      var bo = b.chainOrder != null ? b.chainOrder : 0;
      return ao - bo;
    });
    for (var ri = 0; ri < roots.length; ri++) {
      roots[ri].chainOrder = ri;
    }
  }

  /** 串联主链：在指定根任务之后插入新的根任务（重排 chainOrder 并打开编辑） */
  function insertChainRootAfter(projectId, afterTaskId) {
    var proj = state.projects.find(function (p) {
      return p.id === projectId;
    });
    if (!proj || !isChainProject(proj)) return;
    var roots = state.tasks.filter(function (t) {
      return t.projectId === projectId && !t.parentId;
    });
    roots.sort(function (a, b) {
      var ao = a.chainOrder != null ? a.chainOrder : 999999;
      var bo = b.chainOrder != null ? b.chainOrder : 999999;
      if (ao !== bo) return ao - bo;
      return String(a.id).localeCompare(String(b.id));
    });
    var insertIndex = roots.length;
    if (afterTaskId) {
      for (var i = 0; i < roots.length; i++) {
        if (roots[i].id === afterTaskId) {
          insertIndex = i + 1;
          break;
        }
      }
    }
    var nt = {
      id: uid(),
      projectId: projectId,
      title: "",
      description: "",
      status: "todo",
      priority: "P2",
      assignee: state.userName,
      collaborators: "",
      createdBy: state.userName,
      parentId: null,
      pipelineStage: 0,
      chainOrder: insertIndex,
      startTime: "",
      deadline: "",
      estimatedHours: "",
      actualHours: "",
      tags: "",
    };
    state.tasks.push(nt);
    renumberChainAfterDelete(projectId);
    save(state);
    render();
    openTaskEditor(nt, projectId);
  }

  function collectDescendantTaskIds(taskId) {
    var ids = [taskId];
    var children = state.tasks.filter(function (x) {
      return x.parentId === taskId;
    });
    for (var i = 0; i < children.length; i++) {
      var sub = collectDescendantTaskIds(children[i].id);
      ids = ids.concat(sub);
    }
    return ids;
  }

  function deleteTaskCascade(t) {
    var all = collectDescendantTaskIds(t.id);
    var set = {};
    for (var i = 0; i < all.length; i++) set[all[i]] = true;
    var pid = t.projectId;
    state.tasks = state.tasks.filter(function (x) {
      return !set[x.id];
    });
    state.relations = state.relations.filter(function (r) {
      return !set[r.fromId] && !set[r.toId];
    });
    state.comments = state.comments.filter(function (c) {
      return !set[c.taskId];
    });
    renumberChainAfterDelete(pid);
  }

  /** 永久删除项目及其下全部任务、依赖关系与评论 */
  function deleteProjectById(projectId) {
    var pid = String(projectId || "").trim();
    if (!pid || !state) return false;
    var taskIds = {};
    var i;
    for (i = 0; i < state.tasks.length; i++) {
      if (state.tasks[i].projectId === pid) taskIds[state.tasks[i].id] = true;
    }
    state.tasks = state.tasks.filter(function (t) {
      return t.projectId !== pid;
    });
    state.relations = state.relations.filter(function (r) {
      return !taskIds[r.fromId] && !taskIds[r.toId];
    });
    state.comments = state.comments.filter(function (c) {
      return !taskIds[c.taskId];
    });
    state.projects = state.projects.filter(function (p) {
      return p.id !== pid;
    });
    if (state.currentProjectId === pid) {
      state.currentProjectId = state.projects.length ? state.projects[0].id : "";
    }
    if (typeof __rtVersions !== "undefined" && __rtVersions) delete __rtVersions[pid];
    if (typeof __socket !== "undefined" && __socket && __socket.connected) {
      try {
        __socket.emit("unsubscribe_project", pid);
      } catch (e) {}
    }
    if (useSupabaseMode() && __sb) {
      __sb
        .from("projects")
        .delete()
        .eq("id", pid)
        .catch(function (e) {
          console.error(e);
        });
    }
    delete projectOwnerIds[pid];
    save(state);
    return true;
  }

  /** 插入与当前任务同父、同阶段（流水线）或串联并列子任务 / 主链下一步 */
  function openTaskInsertSibling(t, clickOpts) {
    clickOpts = clickOpts || {};
    var fq = document.getElementById("filter-q");
    var ft = document.getElementById("filter-tag");
    if (fq) fq.value = "";
    if (ft) ft.value = "";
    var proj = state.projects.find(function (x) {
      return x.id === t.projectId;
    });
    if (!proj) return;
    if (isChainProject(proj)) {
      if (!t.parentId) {
        insertChainRootAfter(t.projectId, t.id);
        return;
      }
      openTaskEditor(null, t.projectId, t.parentId);
      return;
    }
    /** 流水线：新任务阶段必须与当前图中所处「列」一致。仅用 t.pipelineStage 可能与渲染列不一致（数据边界情况），故优先使用点击处 DOM 上的 data-flow-column-stage。 */
    var stageForNew = normalizePipelineStage(t, proj);
    if (Object.prototype.hasOwnProperty.call(clickOpts, "fromColumnStage")) {
      var cs = clickOpts.fromColumnStage;
      if (cs !== undefined && cs !== null && cs !== "") {
        var cn = parseInt(String(cs), 10);
        if (!isNaN(cn)) stageForNew = normalizePipelineStage({ pipelineStage: cn }, proj);
      }
    }
    openTaskEditor(null, t.projectId, t.parentId || null, {
      pipelineStage: stageForNew,
      insertAfterTaskId: t.id,
      parallelWithTaskId: t.id,
    });
  }

  /** 在当前节点下新建子任务（流水线阶段与图中列一致；串联项目父任务为当前节点） */
  function openTaskInsertChild(t, clickOpts) {
    clickOpts = clickOpts || {};
    var fq = document.getElementById("filter-q");
    var ft = document.getElementById("filter-tag");
    if (fq) fq.value = "";
    if (ft) ft.value = "";
    var proj = state.projects.find(function (x) {
      return x.id === t.projectId;
    });
    if (!proj) return;
    if (isChainProject(proj)) {
      openTaskEditor(null, t.projectId, t.id);
      return;
    }
    var stageForNew = normalizePipelineStage(t, proj);
    if (Object.prototype.hasOwnProperty.call(clickOpts, "fromColumnStage")) {
      var cs2 = clickOpts.fromColumnStage;
      if (cs2 !== undefined && cs2 !== null && cs2 !== "") {
        var cn2 = parseInt(String(cs2), 10);
        if (!isNaN(cn2)) stageForNew = normalizePipelineStage({ pipelineStage: cn2 }, proj);
      }
    }
    openTaskEditor(null, t.projectId, t.id, { pipelineStage: stageForNew });
  }

  function renderFlowNodeActionsHtml(proj, t) {
    var insLabel = "插入并列";
    if (proj && isChainProject(proj)) {
      insLabel = !t.parentId ? "下方插入" : "插入并列";
    }
    return (
      '<div class="flow-node-actions">' +
      '<button type="button" class="flow-node-act" data-flow-act="ins" data-task-id="' +
      esc(t.id) +
      '" title="新建同级任务">' +
      esc(insLabel) +
      "</button>" +
      '<button type="button" class="flow-node-act" data-flow-act="child" data-task-id="' +
      esc(t.id) +
      '" title="新建子任务">子任务</button>' +
      '<button type="button" class="flow-node-act" data-flow-act="edit" data-task-id="' +
      esc(t.id) +
      '">编辑</button>' +
      '<button type="button" class="flow-node-act" data-flow-act="del" data-task-id="' +
      esc(t.id) +
      '">删除</button>' +
      "</div>"
    );
  }

  function normalizePipelineStage(t, proj) {
    if (isChainProject(proj)) return 0;
    var stages = getProjectStages(proj);
    var max = Math.max(0, stages.length - 1);
    var s = t.pipelineStage;
    if (s === undefined || s === null || s === "") return 0;
    var n = parseInt(s, 10);
    if (isNaN(n)) return 0;
    return Math.max(0, Math.min(max, n));
  }

  function stageLabel(proj, t) {
    if (isChainProject(proj)) {
      var ord = t.chainOrder != null ? t.chainOrder : 0;
      return "串联 · 第 " + (ord + 1) + " 步";
    }
    if (t.parentId) return "子任务";
    var roots = tasksOfProject(state, proj.id).filter(function (x) {
      return !x.parentId;
    });
    roots.sort(sortTasksByDeadlineFlow);
    for (var i = 0; i < roots.length; i++) {
      if (roots[i].id === t.id) return "流程 · 第 " + (i + 1) + " 项";
    }
    return "流程任务";
  }

  function clampProjectTasksStages(proj) {
    if (isChainProject(proj)) return;
    var stages = getProjectStages(proj);
    var max = Math.max(0, stages.length - 1);
    for (var i = 0; i < state.tasks.length; i++) {
      var t = state.tasks[i];
      if (t.projectId !== proj.id) continue;
      if (t.pipelineStage < 0) t.pipelineStage = 0;
      if (t.pipelineStage > max) t.pipelineStage = max;
    }
  }

  function openEditPipelineStages(proj) {
    if (isChainProject(proj)) {
      alert("串联项目无「流程阶段」设置，任务按顺序直线衔接。");
      return;
    }
    var lines = getProjectStages(proj).join("\n");
    openModal(
      "<h3>编辑流程阶段</h3>" +
        '<p class="muted" style="margin:0 0 0.5rem;font-size:12px">每行一个阶段名称，自上而下为流水线顺序。保存后本项目任务的阶段索引会按新列表自动对齐。</p>' +
        '<textarea id="eps-ta" class="input" style="min-height:140px">' +
        esc(lines) +
        "</textarea>" +
        '<div class="flex" style="margin-top:0.75rem;justify-content:flex-end">' +
        '<button type="button" class="btn" id="eps-cancel">取消</button> ' +
        '<button type="button" class="btn btn-primary" id="eps-save">保存</button></div>'
    );
    document.getElementById("eps-cancel").onclick = closeModal;
    document.getElementById("eps-save").onclick = function () {
      var raw = (document.getElementById("eps-ta") && document.getElementById("eps-ta").value) || "";
      var arr = raw
        .split(/\r?\n/)
        .map(function (s) {
          return s.trim();
        })
        .filter(function (s) {
          return s.length > 0;
        });
      if (!arr.length) arr = ["流程"];
      var p = state.projects.find(function (x) {
        return x.id === proj.id;
      });
      if (!p) {
        closeModal();
        return;
      }
      p.pipelineStages = arr;
      clampProjectTasksStages(p);
      closeModal();
      save(state);
      render();
    };
  }

  /** 节点左侧色条：执行状态（非流水线阶段） */
  function nodeProgressClass(t) {
    if (isOverdue(t)) return "fn-overdue";
    if (t.status === "done") return "fn-done";
    if (t.status === "doing") return "fn-doing";
    return "fn-pending";
  }

  function firstIncompleteChainRootIndex(roots) {
    for (var i = 0; i < roots.length; i++) {
      if (roots[i].status !== "done") return i;
    }
    return -1;
  }

  function buildChainContext(proj, ts) {
    var roots = chainRootTasks(ts, proj);
    var fi = firstIncompleteChainRootIndex(roots);
    var rootIndexById = {};
    for (var ri = 0; ri < roots.length; ri++) {
      rootIndexById[roots[ri].id] = ri;
    }
    return { firstIncomplete: fi, rootIndexById: rootIndexById };
  }

  function pipelineFirstIncompleteStage(proj, ts) {
    var minS = 9999;
    for (var i = 0; i < ts.length; i++) {
      var t = ts[i];
      if (t.status === "done") continue;
      var s = normalizePipelineStage(t, proj);
      if (s < minS) minS = s;
    }
    if (minS === 9999) return -1;
    return minS;
  }

  function chainRunClass(proj, t, depth, ctx) {
    if (!ctx || !isChainProject(proj)) return nodeProgressClass(t);
    if (depth > 0) {
      if (t.status === "done") return "fn-sub fn-chain-past";
      if (t.status === "doing" || t.status === "review" || t.status === "blocked") return "fn-sub fn-chain-active";
      return "fn-sub fn-chain-future";
    }
    var idx = ctx.rootIndexById[t.id];
    if (idx === undefined) return nodeProgressClass(t);
    var fi = ctx.firstIncomplete;
    if (fi < 0) return "fn-chain-past";
    if (idx < fi) return "fn-chain-past";
    if (idx > fi) return "fn-chain-future";
    if (t.status === "doing" || t.status === "review" || t.status === "blocked") return "fn-chain-active";
    if (t.status === "done") return "fn-chain-past";
    return "fn-chain-wait";
  }

  function pipelineRunClass(proj, t, depth, ctx) {
    if (!ctx || isChainProject(proj)) return nodeProgressClass(t);
    var s = ctx.taskStage;
    var a = ctx.activeStage;
    if (depth > 0) {
      if (t.status === "done") return "fn-sub fn-chain-past";
      if (t.status === "doing" || t.status === "review" || t.status === "blocked") return "fn-sub fn-chain-active";
      return "fn-sub fn-chain-future";
    }
    if (a < 0) return t.status === "done" ? "fn-chain-past" : "fn-chain-wait";
    if (s < a) return "fn-chain-past";
    if (s > a) return "fn-chain-future";
    if (t.status === "done") return "fn-chain-past";
    if (t.status === "doing" || t.status === "review" || t.status === "blocked") return "fn-chain-active";
    return "fn-chain-wait";
  }

  function flowNodeClass(proj, t, depth, chainCtx, pipelineCtx) {
    if (chainCtx && isChainProject(proj)) return chainRunClass(proj, t, depth, chainCtx);
    if (pipelineCtx && !isChainProject(proj)) return pipelineRunClass(proj, t, depth, pipelineCtx);
    return nodeProgressClass(t);
  }

  function renderChainProgressBanner(proj, ts) {
    if (!isChainProject(proj)) return "";
    var roots = chainRootTasks(ts, proj);
    if (!roots.length) return "";
    var fi = firstIncompleteChainRootIndex(roots);
    var total = roots.length;
    if (fi < 0) {
      return (
        '<div class="chain-progress-banner">串联进度：<strong>已全部完成</strong> · 共 ' +
        total +
        " 步。灰色节点表示历史步骤。</div>"
      );
    }
    var cur = roots[fi];
    var st = STATUS_LABEL[cur.status] || cur.status;
    return (
      '<div class="chain-progress-banner">串联进度：当前运行至 <strong>第 ' +
      (fi + 1) +
      " / " +
      total +
      ' 步</strong> — 「' +
      esc(cur.title) +
      '」<span class="muted"> · 状态 ' +
      esc(st) +
      "</span></div>"
    );
  }

  function renderPipelineProgressBanner(proj, ts) {
    if (isChainProject(proj)) return "";
    var roots = ts.filter(function (t) {
      return !t.parentId;
    });
    roots.sort(sortTasksByDeadlineFlow);
    if (!roots.length) return "";
    var fi = firstIncompleteChainRootIndex(roots);
    if (fi < 0) {
      return (
        '<div class="chain-progress-banner">任务进度：<strong>全部主任务已完成</strong> · 共 ' +
        roots.length +
        " 项。</div>"
      );
    }
    var cur = roots[fi];
    var st = STATUS_LABEL[cur.status] || cur.status;
    return (
      '<div class="chain-progress-banner">任务进度：当前执行 <strong>第 ' +
      (fi + 1) +
      " / " +
      roots.length +
      ' 项</strong> — 「' +
      esc(cur.title) +
      '」<span class="muted"> · 状态 ' +
      esc(st) +
      "</span></div>"
    );
  }

  function renderFlowLegend(proj) {
    if (proj && isChainProject(proj)) {
      return (
        '<div class="flow-legend card">' +
        "<strong>图例</strong> " +
        '<span class="muted">串联：父任务在上、子任务横排并列。</span> ' +
        '<span><i style="background:#cbd5e1;border:1px solid #e2e8f0"></i>已完成 / 已过</span>' +
        '<span><i style="background:#2563eb"></i>处理中</span>' +
        '<span><i style="background:#fff;border:1px solid #e2e8f0"></i>尚未轮到</span>' +
        '<span><i style="background:repeating-linear-gradient(90deg,#fff,#fff 2px,#fecaca 2px,#fecaca 4px)"></i>本步待开工</span>' +
        '<span><i style="background:#ea580c"></i>已超期（高亮框）</span>' +
        "</div>"
      );
    }
    return (
      '<div class="flow-legend card">' +
        "<strong>图例</strong> " +
        '<span class="muted">流程：一级主任务按顺序向下，子任务在父任务下横向展开。</span> ' +
        '<span><i style="background:#cbd5e1;border:1px solid #e2e8f0"></i>已完成</span>' +
        '<span><i style="background:#2563eb"></i>处理中</span>' +
        '<span><i style="background:#fff;border:1px solid #e2e8f0"></i>待处理</span>' +
        '<span><i style="background:#ea580c"></i>已超期</span>' +
        "</div>"
    );
  }

  function renderFlowNode(proj, t, depth, chainCtx, pipelineCtx, opts) {
    opts = opts || {};
    depth = depth || 0;
    var stLabel = STATUS_LABEL[t.status] || t.status;
    var projectTasks = tasksOfProject(state, t.projectId);
    var depBlockers = taskDependencyBlockers(t, projectTasks);
    var pc = flowNodeClass(proj, t, depth, chainCtx, pipelineCtx);
    if (isOverdue(t) && t.status !== "done") pc += " fn-overdue";
    if (opts.wideParent) pc += " flow-node--parallel-parent";
    var colAttr =
      pipelineCtx && !isChainProject(proj)
        ? ' data-flow-column-stage="' + esc(String(pipelineCtx.taskStage)) + '"'
        : "";
    return (
      '<div class="flow-node ' +
      pc +
      '" style="margin-left:' +
      depth * 14 +
      'px" data-flow-open="' +
      esc(t.id) +
      '"' +
      colAttr +
      '>' +
      '<div class="fn-title">' +
      esc(t.title) +
      "</div>" +
      '<div class="' +
      flowDdlStripClass(t) +
      '" title="时间要求">' +
      esc(flowDdlStripLabel(t)) +
      "</div>" +
      '<div class="fn-meta">' +
      esc(stLabel) +
  (t.assignee ? " · " + esc(t.assignee) : "") +
      (depBlockers.length && t.status !== "done" ? " · 依赖阻塞(" + depBlockers.length + ")" : "") +
      (t.deadline ? " · 截止 " + esc(String(t.deadline).slice(0, 10)) : "") +
      (t.description && String(t.description).trim()
        ? " · " + esc(String(t.description).slice(0, 22)) + (String(t.description).length > 22 ? "…" : "")
        : "") +
      "</div>" +
      renderFlowNodeActionsHtml(proj, t) +
      "</div>"
    );
  }

  function renderFlowNodeRecursive(proj, inCol, t, depth, chainCtx, pipelineCtx) {
    var children = inCol.filter(function (c) {
      return c.parentId === t.id;
    });
    if (children.length === 0) return renderFlowNode(proj, t, depth, chainCtx, pipelineCtx);
    children.sort(sortTasksByDeadlineFlow);
    if (children.length === 1) {
      return (
        renderFlowNode(proj, t, depth, chainCtx, pipelineCtx) +
        renderFlowNodeRecursive(proj, inCol, children[0], depth + 1, chainCtx, pipelineCtx)
      );
    }
    var html = renderFlowNode(proj, t, depth, chainCtx, pipelineCtx, { wideParent: true });
    html += '<div class="flow-parallel-fanout">';
    html +=
      '<div class="flow-fanout-arrows" style="grid-template-columns:repeat(' +
      children.length +
      ',minmax(0,1fr))">';
    for (var ai = 0; ai < children.length; ai++) {
      html +=
        '<div class="flow-fanout-arrow-cell"><span class="flow-fanout-down" title="自父任务拆出的支线">↓</span></div>';
    }
    html += "</div>";
    html +=
      '<div class="flow-children-row flow-children-row--fanout" style="grid-template-columns:repeat(' +
      children.length +
      ',minmax(0,1fr))">';
    for (var k = 0; k < children.length; k++) {
      html += '<div class="flow-child-branch">';
      html += renderFlowNodeRecursive(proj, inCol, children[k], depth + 1, chainCtx, pipelineCtx);
      html += "</div>";
    }
    html += "</div></div>";
    return html;
  }

  function renderColumnTree(proj, ts, stageIdx, activeStage) {
    var inCol = [];
    for (var i = 0; i < ts.length; i++) {
      if (normalizePipelineStage(ts[i], proj) === stageIdx) inCol.push(ts[i]);
    }
    var roots = inCol.filter(function (t) {
      if (!t.parentId) return true;
      var p = state.tasks.find(function (x) {
        return x.id === t.parentId;
      });
      if (!p) return true;
      return normalizePipelineStage(p, proj) !== stageIdx;
    });
    if (roots.length === 0) return '<p class="muted" style="margin:0;font-size:11px">—</p>';
    roots.sort(sortTasksByDeadlineFlow);
    var pipelineCtx = { taskStage: stageIdx, activeStage: activeStage };
    var inner = "";
    for (var j = 0; j < roots.length; j++) {
      if (j > 0) {
        inner +=
          '<div class="flow-root-connector" title="同阶段内按截止日由早到晚排列"><span>↓</span>时间先后</div>';
      }
      inner += renderFlowNodeRecursive(proj, inCol, roots[j], 0, null, pipelineCtx);
    }
    return inner;
  }

  function renderPipelineStrip(proj, ts) {
    var allTs = tasksOfProject(state, proj.id);
    var roots = ts.filter(function (t) {
      return !t.parentId;
    });
    roots.sort(sortTasksByDeadlineFlow);
    if (!roots.length) {
      return '<p class="muted">暂无任务，请用「新建任务」从顶部按钮添加。</p>';
    }
    var groupOrder = [];
    var groups = {};
    for (var gi = 0; gi < roots.length; gi++) {
      var rt = roots[gi];
      var gk = rt.parallelGroup ? String(rt.parallelGroup) : String(rt.id);
      if (!groups[gk]) {
        groups[gk] = [];
        groupOrder.push(gk);
      }
      groups[gk].push(rt);
    }
    var html = '<div class="pipeline-wrapper pipeline-vertical">';
    for (var si = 0; si < groupOrder.length; si++) {
      var grp = groups[groupOrder[si]] || [];
      var title = grp[0] && grp[0].title ? grp[0].title : ("任务 " + (si + 1));
      html +=
        '<div class="pipeline-v-box stg-' +
        si % 7 +
        '">' +
        '<div class="pipeline-v-box-head">' +
        '<span class="pipeline-step-num">任务 ' +
        (si + 1) +
        " / " +
        groupOrder.length +
        "</span>" +
        '<span class="pipeline-v-title">' +
        esc(title) +
        "</span></div>" +
        '<div class="pipeline-v-box-body">';
      if (grp.length > 1) {
        html += '<div class="flow-children-row" title="同方框并列任务，左右并排">';
        for (var pj = 0; pj < grp.length; pj++) {
          if (pj > 0) html += '<div class="flow-sibling-arrow"><span class="flow-sibling-arrow-inner">→</span></div>';
          html += '<div class="flow-child-branch">';
          html += renderFlowNodeRecursive(proj, allTs, grp[pj], 0, null, null);
          html += "</div>";
        }
        html += "</div>";
      } else if (grp.length === 1) {
        html += renderFlowNodeRecursive(proj, allTs, grp[0], 0, null, null);
      }
      html += "</div></div>";
      if (si < groupOrder.length - 1) {
        html +=
          '<div class="pipeline-v-arrow" title="下一任务（顺序执行）">' +
          '<div class="arrow-shaft"></div>' +
          '<div class="arrow-head">▼</div>' +
          "</div>";
      }
    }
    html += "</div>";
    return html;
  }

  function renderChainStrip(proj, ts) {
    var allTs = tasksOfProject(state, proj.id);
    var roots = chainRootTasks(ts, proj);
    if (!roots.length) {
      return '<p class="muted">暂无任务，请用「新建任务」从顶部按钮添加。</p>';
    }
    var chainCtx = buildChainContext(proj, ts);
    var html = '<div class="pipeline-wrapper pipeline-vertical chain-linear">';
    for (var i = 0; i < roots.length; i++) {
      html +=
        '<div class="pipeline-v-box stg-' +
        i % 7 +
        '">' +
        '<div class="pipeline-v-box-head">' +
        '<span class="pipeline-step-num">顺序 ' +
        (i + 1) +
        " / " +
        roots.length +
        "</span>" +
        '<span class="pipeline-v-title">任务 ' +
        (i + 1) +
        "</span></div>" +
        '<div class="pipeline-v-box-body">' +
        renderFlowNodeRecursive(proj, allTs, roots[i], 0, chainCtx, null) +
        "</div></div>";
      if (i < roots.length - 1) {
        html +=
          '<div class="pipeline-v-arrow" title="下一任务（整体按截止日自上而下）">' +
          '<div class="arrow-shaft"></div>' +
          '<div class="arrow-head">▼</div>' +
          "</div>";
      }
    }
    html += "</div>";
    return html;
  }

  function renderFlowOverlayInner(proj, ts) {
    var sub =
      proj && isChainProject(proj)
        ? '<p class="muted" style="margin:0">串联：<strong>自上而下按截止日</strong>排列；步间▼、同父多子任务间→。卡片色条表示时间要求。点击任务查看详情；「新建任务」在末尾追加。</p>'
        : '<p class="muted" style="margin:0">项目流程：<strong>一级主任务按顺序向下</strong>，用▼表示先后；每个主任务下可挂子任务（横向）。点击卡片打开详情。</p>';
    var body = isChainProject(proj) ? renderChainStrip(proj, ts) : renderPipelineStrip(proj, ts);
    var banner = isChainProject(proj) ? renderChainProgressBanner(proj, ts) : renderPipelineProgressBanner(proj, ts);
    return (
      '<div class="flow-overlay-inner">' +

  /** Markdown 水平线 --- / *** / ___ */
  function isMarkdownHrLine(s) {

  /**
   * 去掉 # 标题、列表 * / -、加粗 **，便于识别「任务1：」「负责人：」等。
   * 长文档里 * **负责人**：PM、### 任务1： 等格式依赖此函数。
   */
  function stripMarkdownForMeetingLine(line) {
    var s = String(line || "").trim();
    if (!s) return "";
    if (isMarkdownHrLine(s)) return "";
    while (/^>\s/.test(s)) {
      s = s.replace(/^>\s+/, "").trim();
    }
    s = s.replace(/^#{1,6}\s+/, "");
    s = s.replace(/^([*\-+]\s*)+/, "");
    s = s.replace(/\*\*/g, "");
    s = normalizeMeetingUnicodeChars(s);
    return s.trim();
  }

  /** BOM、全角数字 ０-９ → ASCII，便于「任务１：」等识别 */
  function normalizeMeetingUnicodeChars(s) {
    return String(s || "")
      .replace(/\uFEFF/g, "")
      .replace(/[\uFF10-\uFF19]/g, function (ch) {
        return String.fromCharCode(ch.charCodeAt(0) - 0xff10 + 0x30);
      });
  }

  /** 任务行标记：任务 + 阿拉伯/中文数字 / Task N */
  function isMeetingTaskMarkerLine(stripped) {
    if (!stripped) return false;
    var s = normalizeMeetingUnicodeChars(stripped);
    return (
      /^任务\s*(?:\d+|[一二三四五六七八九十百千万零〇两]+)\s*[：:]/.test(s) ||
      /^Task\s*\d+\s*[：:]/i.test(s)
    );
  }

  function meetingTextContainsTaskMarker(text) {
    var t = normalizeMeetingUnicodeChars(String(text || ""));
    return /任务\s*(?:\d+|[一二三四五六七八九十百千万零〇两]+)\s*[：:]/i.test(t) || /Task\s*\d+\s*[：:]/i.test(t);
  }

  function extractMeetingTaskTitleFromMarkerLine(stripped) {
    if (!stripped) return null;
    var s = normalizeMeetingUnicodeChars(stripped);
    var m;
    if ((m = s.match(/^任务\s*(?:\d+|[一二三四五六七八九十百千万零〇两]+)\s*[：:]\s*(.*)$/i))) return m[1].trim();
    if ((m = s.match(/^Task\s*\d+\s*[：:]\s*(.*)$/i))) return m[1].trim();
    return null;
  }

  /**
   * 去掉 ChatGPT 式对话前言与尾部「优化说明 / 面试王炸 / 甘特图」等，避免误解析、减轻 AI 噪声。
   */
  function trimChatGptMeetingPreamble(text) {
    var s = String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
    var m = s.match(/(^|\n)(#+\s+[^\n]+|###\s*任务\s*(?:\d+|[一二三四五六七八九十百千万零〇两]+)\s*[：:])/im);
    if (m && m.index !== undefined) {
      var start = m.index;
      if (m[1] === "\n") start += 1;
      s = s.slice(start);
    }
    var lines = s.split("\n");
    var cut = lines.length;
    var j;
    for (j = 0; j < lines.length; j++) {
      var ln = lines[j].trim();
      if (/^#\s*[🧠💡]/.test(ln)) {
        cut = j;
        break;
      }
      if (/^#\s*(优化说明|如果你想更高级|如果你想|如果你|面试王炸)/.test(ln)) {
        cut = j;
        break;
      }
    }
    s = lines.slice(0, cut).join("\n").trim();
    return s;
  }

  /** 从正文前部提取《项目名》与项目周期等关键词（省略大段说明） */
  function extractMeetingProjectHints(lines) {
    var o = { projectName: null, periodLine: "" };
    var head = (lines || []).slice(0, 50).join("\n");
    var m = head.match(/《([^》]{1,120})》/);
    if (m) o.projectName = m[1].trim();
    var pr = head.match(/项目周期[：:]\s*([^\n]+)/i);
    if (pr) o.periodLine = pr[1].trim().replace(/\*\*/g, "").trim();
    if (!o.periodLine) {
      pr = head.match(/项目周期为\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日(?:至|到|-|—)\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/);

  function meetingProseLooksLikely(raw) {

  function isProseMeetingNoiseSentence(s) {
    var t = String(s || "").trim();

  function cleanProseAssignee(s) {

      .replace(/\s+/g, " ")
      .replace(
        /^(?:项目经理|本地化负责人|录音导演|审校负责人|音频制作人|音频工程师|开发负责人|QA负责人|制作人|日本LQA团队负责人|本地化PM|音频PM|日语Adaptation负责人)\s*/i,
        ""

      .replace(/^(?:本地化PM|录音导演|PM)\s*/i, "")
      .trim()
      .slice(0, 48);

  function extractProseClauseDate(clause, year) {
    var m = clause.match(/(?:于|在|至)\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日(?:前)?/);
    if (!m) m = clause.match(/(\d{1,2})\s*月\s*(\d{1,2})\s*日(?:前)?/);
    if (!m) return "";
    var mo = parseInt(m[1], 10);
    var d = parseInt(m[2], 10);

  }

  function extractProseTitleFromClause(clause) {
    var c = String(clause || "").trim();
    var m;
    if ((m = c.match(/\d{1,2}\s*月\s*\d{1,2}\s*日(?:正式)?上线/))) return "正式上线";
    if ((m = c.match(/日(?:前)?(?:完成|输出|组织|导入)([^，。；]{2,120})/))) return m[1].trim().replace(/确认$/, "确认").slice(0, 120);
    if ((m = c.match(/在\s*\d{1,2}\s*月\s*\d{1,2}\s*日(?:前)?组织(.+)/))) return m[1].trim().slice(0, 120);
    if ((m = c.match(/在\s*\d{1,2}\s*月\s*\d{1,2}\s*日(?:前)?(?:完成|输出|组织)([^，。；]{2,120})/))) return m[1].trim().slice(0, 120);
    if ((m = c.match(/(?:并由|由)?[^，。]*?进行([^，。；]{2,80})/))) return m[1].trim().slice(0, 120);
    if ((m = c.match(/(?:完成|输出|组织)([^，。；]{2,120})/))) return m[1].trim().slice(0, 120);

  function extractProseAssigneeFromClause(clause) {
    var c = String(clause || "").trim();
    var m;
    if ((m = c.match(/由([^，。；]{2,45}?)（[A-Za-z0-9 .]+）牵头/))) return cleanProseAssignee(m[1]);
    if ((m = c.match(/由([^，。；]{2,45}?)（[A-Za-z0-9 .]+）主导/))) return cleanProseAssignee(m[1]);
    if ((m = c.match(/由([^，。；]{2,45}?)（[A-Za-z0-9 .]+）负责/))) return cleanProseAssignee(m[1]);
    if ((m = c.match(/由([^，。；]{2,45}?)主导/))) return cleanProseAssignee(m[1]);

        .replace(/日语Adaptation负责人\s*/i, "")
        .replace(/负责人\s*/i, "")

        .slice(0, 40);

    }
    if ((m = c.match(/([^，。；]{2,30}?)（[A-Za-z0-9 .]+）\s*于\s*\d{1,2}\s*月/))) return cleanProseAssignee(m[1]);
    if ((m = c.match(/([^，。；]{2,30}?)（[A-Za-z0-9 .]+）\s*在\s*\d{1,2}\s*月/))) return cleanProseAssignee(m[1]);
    if ((m = c.match(/审校负责人([^，。；]{2,22}?)（[A-Za-z0-9 .]+）/))) return cleanProseAssignee(m[1]);
    if ((m = c.match(/(?:QA负责人|日本LQA团队负责人)([^，。；]{2,30}?)(?:（[A-Za-z .]+）)?于/))) return cleanProseAssignee(m[1]);
    if ((m = c.match(/(?:QA负责人|日本LQA团队负责人)([^，。；]{2,30}?)(?:（[A-Za-z .]+）)?/))) return cleanProseAssignee(m[1]);
    if ((m = c.match(/由(?:录音导演|开发负责人|音频制作人|音频工程师|开发负责人)([^，。；]{2,30}?)(?:（[A-Za-z .]+）)?负责/))) return cleanProseAssignee(m[1]);
    if ((m = c.match(/由([^，。；]{2,40}?)(?:于|在)\s*\d{1,2}\s*月/))) return cleanProseAssignee(m[1]);

  function extractProseCollaboratorsFromClause(clause) {

    var b = String(m[2] || "")
      .replace(/日语Adaptation负责人\s*/i, "")
      .replace(/负责人\s*/i, "")
      .trim()
      .slice(0, 80);

  function splitCommaSubtasksInSentence(s) {
    var parts = s.split(/，/);
    var out = [];
    var buf = "";
    var hasDate = function (b) {
      return /\d{1,2}\s*月\s*\d{1,2}\s*日/.test(b);
    };
    var i;
    for (i = 0; i < parts.length; i++) {
      var p = parts[i];
      if (i === 0) {
        buf = p;
        continue;
      }
      if (/^于\d{1,2}\s*月/.test(p)) {
        buf += "，" + p;
        continue;
      }
      if (hasDate(buf) && hasDate(p) && /^\d{1,2}\s*月\s*\d{1,2}\s*日(?:正式)?上线/.test(p)) {
        out.push(buf);
        buf = p;
        continue;
      }
      if (hasDate(buf) && hasDate(p) && /^(?:QA负责人|日本LQA|并由|Emily)/.test(p)) {
        out.push(buf);
        buf = p;
      } else if (hasDate(buf) && /^(?:[A-Za-z][A-Za-z .]{2,35})\s*于/.test(p)) {
        out.push(buf);
        buf = p;
      } else {
        buf += "，" + p;
      }
    }
    if (buf) out.push(buf);
    return out.length ? out : [s];
  }

  function expandProseByYouBing(sentence) {
    var s = String(sentence || "").trim();
    if (!s) return [];
    if (s.indexOf("，并由") < 0) return [s];
    return s.split(/，并由/).map(function (x, i) {
      x = x.trim();
      if (!x) return "";
      return i > 0 ? "并由" + x : x;
    }).filter(Boolean);
  }

  function buildProseTaskFromClause(clause, fallbackDate, year) {
    var c = String(clause || "").trim();
    if (c.length < 8) return null;
    var dt = extractProseClauseDate(c, year);
    if (!dt && fallbackDate) dt = fallbackDate;
    if (!dt) return null;
    var assignee = extractProseAssigneeFromClause(c);
    var collaborators = extractProseCollaboratorsFromClause(c);
    if (collaborators && assignee.indexOf("、") >= 0) collaborators = "";
    var title = extractProseTitleFromClause(c);
    if (!title || title.length < 2) return null;
    if (/七个阶段|关键路径|整体调整|资源协调/.test(title)) return null;
    if (!assignee && !/^正式上线$|^版本上线$/.test(title)) return null;
    return {
      title: title.slice(0, 500),
      description: c.slice(0, 500),

      priority: "P2",
