  function parseMeetingProseNarrative(raw, warnings) {
    var tasks = [];
    var year = new Date().getFullYear();
    var ym = String(raw).match(/(20\d{2})\s*年/);
    if (ym) year = parseInt(ym[1], 10);
    var text = String(raw || "").replace(/\s+/g, " ").trim();
    var pm = text.match(/《([^》]{1,120})》/);
    var projectName = pm ? pm[1].trim() : null;
    var sentences = text.split(/[。；]+/).map(function (x) {
      return x.trim();
    }).filter(Boolean);
    var lastDateGlobal = "";
    var si;
    for (si = 0; si < sentences.length; si++) {
      var S = sentences[si];
      if (isProseMeetingNoiseSentence(S)) continue;
      var firstDate = extractProseClauseDate(S, year);
      var chunks = expandProseByYouBing(S);
      var ci;
      for (ci = 0; ci < chunks.length; ci++) {
        var chunk = chunks[ci];
        var subParts = splitCommaSubtasksInSentence(chunk);
        var pi;
        var lastDateInChunk = lastDateGlobal || firstDate;
        for (pi = 0; pi < subParts.length; pi++) {
          var part = subParts[pi].trim();
          if (!part || part.length < 6) continue;
          var dPart = extractProseClauseDate(part, year);
          var fallback = dPart || lastDateInChunk || lastDateGlobal || firstDate;
          var task = buildProseTaskFromClause(part, fallback, year);
          if (dPart) {
            lastDateInChunk = dPart;
            lastDateGlobal = dPart;
          } else if (task && task.deadline) {
            lastDateGlobal = task.deadline;
            lastDateInChunk = task.deadline;
          }
          if (task && task.title) tasks.push(task);
        }
      }
    }
    var seen = {};
    var deduped = [];
    var ti;
    for (ti = 0; ti < tasks.length; ti++) {
      var k = tasks[ti].title + "|" + tasks[ti].deadline + "|" + tasks[ti].assignee;
      if (seen[k]) continue;
      seen[k] = 1;
      deduped.push(tasks[ti]);
    }
    if (deduped.length && warnings) warnings.push("已从自然语言会议纪要中识别任务（按日期与负责人拆分）。");
    return { tasks: deduped.slice(0, 80), projectName: projectName };
  }

  /**
   * 按「任务1：」「任务2：」等标记扫描整篇，不依赖空行分块；适合 ChatGPT Markdown 长文。
   */
  function parseMeetingTaskMarkerScan(lines, warnings) {
    var ctx = {
      projectName: null,
      renameProject: null,
      chainHint: false,
      pipelineStages: null,
      pipelineStagesFromMeta: false,
      _stageIdx: 0,
    };
    var tasks = [];
    var i = 0;
    var m;
    while (i < lines.length) {
      var tr = lines[i].trim();
      if (!tr) {
        i++;
        continue;
      }
      if (isMarkdownHrLine(tr)) {
        i++;
        continue;
      }
      if (handleMeetingMetaLine(tr, ctx)) {
        i++;
        continue;
      }
      if (looksLikeWorkflowSectionHeading(tr)) {
        if (!ctx.pipelineStagesFromMeta) {
          if (!ctx.pipelineStages) ctx.pipelineStages = [];
          ctx.pipelineStages.push(cleanWorkflowSectionLabel(tr));
          ctx._stageIdx = ctx.pipelineStages.length - 1;
        }
        i++;
        continue;
      }
      var tbl = tryParseTableRow(tr);
      if (tbl === "header") {
        i++;
        continue;
      }
      if (tbl && typeof tbl === "object") {
        tbl.pipelineStage = ctx.pipelineStages && ctx.pipelineStages.length ? ctx._stageIdx : 0;
        tasks.push(tbl);
        i++;
        continue;
      }
      var ls = stripMarkdownForMeetingLine(tr);
      if (!isMeetingTaskMarkerLine(ls)) {
        i++;
        continue;
      }
      var chunk = [lines[i]];
      i++;
      while (i < lines.length) {
        var ln = lines[i].trim();
        if (!ln) {
          chunk.push(lines[i]);
          i++;
          continue;
        }
        if (isMarkdownHrLine(ln)) {
          i++;
          continue;
        }
        var lss = stripMarkdownForMeetingLine(lines[i]);
        if (isMeetingTaskMarkerLine(lss)) break;
        if (looksLikeWorkflowSectionHeading(lines[i])) break;
        chunk.push(lines[i]);
        i++;
      }
      var line0 = chunk[0].trim();
      var tl = extractTaskLine(line0);
      var fullChunk = chunk.join("\n");
      var core = tl;
      if (tl == null) {
        var ls0 = stripMarkdownForMeetingLine(line0);
        core = extractMeetingTaskTitleFromMarkerLine(ls0) || ls0;
      }
      var base = parseTaskLine(core, fullChunk.replace(/\n/g, " "));
      if (chunk.length > 1) mergeTaskFields(base, parseFieldsFromLines(chunk.slice(1)));
      base.pipelineStage = ctx.pipelineStages && ctx.pipelineStages.length ? ctx._stageIdx : 0;
      if (base.title && String(base.title).trim()) tasks.push(base);
    }
    return {
      projectName: ctx.projectName,
      renameProject: ctx.renameProject,
      chainHint: ctx.chainHint,
      pipelineStages: ctx.pipelineStages,
      tasks: tasks,
    };
  }

  function parseFlexibleDate(s) {
    if (!s) return "";
    var str = String(s).trim().replace(/\*\*/g, "");
    var m = str.match(/(\d{4})\s*[-\/年．\.]\s*(\d{1,2})\s*[-\/月．\.]\s*(\d{1,2})/);
    if (m) return m[1] + "-" + pad2(m[2]) + "-" + pad2(m[3]);
    m = str.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) return m[1] + "-" + pad2(m[2]) + "-" + pad2(m[3]);
    m = str.match(/(\d{1,2})\s*\/\s*(\d{1,2})\s*\/\s*(\d{4}|\d{2})/);
    if (m) {
      var y3 = parseInt(m[3], 10);
      if (y3 < 100) y3 += 2000;
      return y3 + "-" + pad2(parseInt(m[1], 10)) + "-" + pad2(parseInt(m[2], 10));
    }
    m = str.match(/(\d{1,2})\s*\/\s*(\d{1,2})/);
    if (m) {
      var yd = new Date().getFullYear();
      return yd + "-" + pad2(parseInt(m[1], 10)) + "-" + pad2(parseInt(m[2], 10));
    }
    return "";
  }

  function normalizePriorityToken(p) {
    var raw = String(p || "").trim();
    if (/🔥|火焰|高优|最高|紧急|P0/i.test(raw)) return "P0";
    var x = raw.toUpperCase();
    if (/^P[0-3]$/.test(x)) return x;
    if (/^(高|紧急)/.test(raw)) return "P0";
    if (/^中/.test(raw)) return "P2";
    if (/^低/.test(raw)) return "P3";
    return "";
  }

  function normalizeStatusToken(st) {
    var s = String(st || "").trim();
    if (/完成|已完|搞定|✓|√/.test(s)) return "done";
    if (/进行中|正在|处理中/.test(s)) return "doing";
    if (/阻塞|卡住/.test(s)) return "blocked";
    if (/评审|待审|审核/.test(s)) return "review";
    return "";
  }

  function parseFieldsFromLines(lines) {
    var o = { assignee: "", collaborators: "", deadline: "", priority: "", status: "", description: "", tags: "" };
    var i;
    var m;
    for (i = 0; i < lines.length; i++) {
      var t = stripMarkdownForMeetingLine(lines[i] || "");
      if (!t) continue;
      if ((m = t.match(/^(?:负责人|责任人|指派|Owner|执行人)\s*[：:]\s*(.+)$/i))) o.assignee = m[1].trim();
      else if ((m = t.match(/^(?:负责人|指派)\s+([\u4e00-\u9fa5A-Za-z.\-]{1,24})\s*$/))) o.assignee = m[1].trim();
      else if ((m = t.match(/^(?:协作人|协作|参与人|抄送|配合)\s*[：:]\s*(.+)$/))) o.collaborators = m[1].trim();
      else if ((m = t.match(/^(?:协作人|协作)\s+([\u4e00-\u9fa5A-Za-z.\-，,、\s]{1,80})\s*$/))) o.collaborators = m[1].trim();
      else if ((m = t.match(/^(?:DDL|截止|截止日期|deadline|完成时间)\s*[：:]?\s*(.+)$/i))) {
        o.deadline = parseFlexibleDate(m[1]) || ((m[1].match(/\d{4}-\d{2}-\d{2}/) || [])[0] || "");
      } else if ((m = t.match(/^(?:优先级|优先)\s*[：:]\s*(.+)$/))) {
        o.priority = normalizePriorityToken(m[1]) || m[1].trim();
      } else if ((m = t.match(/^(?:状态|进度)\s*[：:]\s*(.+)$/))) o.status = m[1].trim();
      else if ((m = t.match(/^(?:描述|备注|说明)\s*[：:]\s*(.+)$/))) o.description = (o.description ? o.description + "\n" : "") + m[1].trim();
      else if (/^P[0-3]\s*$/i.test(t)) o.priority = t.toUpperCase();
      else o.description = (o.description ? o.description + "\n" : "") + t;
    }
    return o;
  }

  function mergeTaskFields(base, extra) {
    if (!extra) return base;
    if (extra.assignee) base.assignee = extra.assignee;
    if (extra.collaborators) base.collaborators = extra.collaborators;
    if (extra.deadline) base.deadline = extra.deadline;
    if (extra.priority) base.priority = normalizePriorityToken(extra.priority) || extra.priority;
    if (extra.status) {
      var ns = normalizeStatusToken(extra.status);
      if (ns) base.status = ns;
    }
    if (extra.description) base.description = ((base.description || "") + "\n" + extra.description).trim();
    if (extra.tags) base.tags = (base.tags ? base.tags + "," : "") + extra.tags;
    return base;
  }

  function isContinuationFieldLine(tr) {
    var s = stripMarkdownForMeetingLine(tr);
    if (!s) return false;
    if (/^(?:负责人|责任人|指派|Owner|执行人)\s*[：:]/i.test(s)) return true;
    if (/^(?:负责人|指派)\s+[\u4e00-\u9fa5A-Za-z.\-]/.test(s)) return true;
    if (/^(?:协作人|协作|参与人|抄送|配合)\s*[：:]/.test(s)) return true;
    if (/^(?:协作人|协作)\s+[\u4e00-\u9fa5A-Za-z]/.test(s)) return true;
    if (/^(?:DDL|截止|截止日期|deadline|完成时间)\s*[：:]?/i.test(s)) return true;
    if (/^(?:优先级|优先|状态|进度|描述|备注|说明)\s*[：:]/i.test(s)) return true;
    if (/^P[0-3]\s*$/i.test(s)) return true;
    return false;
  }

  /**
   * 从一整段任务文本（可含多行、行内字段）抽取负责人/协作/DDL/优先级，剩余为标题。
   */
  function parseTaskStructured(fullText) {
    var lineJoined = String(fullText || "")
      .replace(/\r\n/g, "\n")
      .split(/\n/)
      .map(function (l) {
        return stripMarkdownForMeetingLine(l);
      })
      .filter(Boolean)
      .join(" ");
    var work = lineJoined.replace(/\s+/g, " ").trim();
    var assignee = "";
    var collaborators = "";
    var deadline = "";
    var priority = "P2";
    var status = "todo";
    var tags = [];
    var br = lineJoined.match(/【([^】]+)】/g);
    if (br) {
      for (var bx = 0; bx < br.length; bx++) {
        var inner = br[bx].replace(/[【】]/g, "");
        if (/^P[0-3]$/i.test(inner)) continue;
        tags.push(inner);
      }
    }
    var m;
    var prBr = work.match(/【\s*(P[0-3])\s*】/i);
    if (prBr) {
      priority = prBr[1].toUpperCase();
      work = work.replace(prBr[0], " ").replace(/\s+/g, " ").trim();
    }
    m = work.match(/(?:DDL|截止(?:日期)?|deadline|完成时间|交付)\s*[：:]\s*(\d{4}\s*[-\/年．\.]\s*\d{1,2}\s*[-\/月．\.]\s*\d{1,2}|\d{4}-\d{1,2}-\d{1,2})/i);
    if (m) {
      deadline = parseFlexibleDate(m[1]) || m[1];
      work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
    }
    if (!deadline) {
      m = work.match(/(?:DDL|截止(?:日期)?|deadline|完成时间)\s+(\d{4}\s*[-\/年．\.]\s*\d{1,2}\s*[-\/月．\.]\s*\d{1,2}|\d{4}-\d{1,2}-\d{1,2})/i);
      if (m) {
        deadline = parseFlexibleDate(m[1]) || m[1];
        work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
      }
    }
    if (!deadline) {
      m = work.match(/(?:DDL|截止(?:日期)?|deadline|完成时间|交付)\s*[：:]\s*(\d{1,2}\s*\/\s*\d{1,2}(?:\s*\/\s*\d{2,4})?)/i);
      if (m) {
        deadline = parseFlexibleDate(m[1]) || "";
        if (deadline) work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
      }
    }
    if (!deadline) {
      m = work.match(/\b(\d{4}-\d{2}-\d{2})\b/);
      if (m) {
        deadline = m[1];
        work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
      }
    }
    m = work.match(/(?:^|[\s;；,])(?:负责人|责任人|指派|Owner|执行人)\s*[：:]\s*([^;；,，\|｜]+?)(?=\s+(?:协作|协作人|DDL|截止|deadline|P[0-3]|优先级|$)|$)/i);
    if (!m) m = work.match(/(?:负责人|责任人|指派|执行人)\s*[：:]\s*([^;；]+?)(?=\s+(?:协作|协作人|DDL|截止|deadline|P[0-3]|优先级)|$)/i);
    if (!m) m = work.match(/(?:负责人|责任人|指派|执行人)\s*[：:]\s*([^;；]+)/i);
    if (m) {
      assignee = m[1].trim().replace(/\s+$/, "");
      work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
    }
    if (!assignee) {
      m = work.match(/(?:^|[\s,，])(?:负责人|指派)\s+([\u4e00-\u9fa5A-Za-z.\-]{2,24})(?=\s|$)/);
      if (m) {
        assignee = m[1].trim();
        work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
      }
    }
    m = work.match(/(?:协作人|协作|参与人|抄送|配合)\s*[：:]\s*([^;；]+?)(?=\s+(?:负责人|DDL|截止|P[0-3]|优先级|$)|$)/i);
    if (m) {
      collaborators = m[1].trim();
      work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
    }
    if (!collaborators) {
      m = work.match(/(?:^|[\s,，])(?:协作人|协作)\s+([\u4e00-\u9fa5A-Za-z.\-]{2,24})(?=\s|$)/);
      if (m) {
        collaborators = m[1].trim();
        work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
      }
    }
    if (!assignee) {
      m = work.match(/@([\u4e00-\u9fa5A-Za-z.\-]{1,24})/);
      if (m) {
        assignee = m[1];
        work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
      }
    }
    if (!prBr) {
      m = work.match(/\b(P[0-3])\b/i);
      if (m) {
        priority = m[1].toUpperCase();
        work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
      }
    }
    m = work.match(/(?:优先级|优先)\s*[：:]\s*([^;；]+?)(?=\s+(?:负责人|协作|DDL|截止|$)|$)/i);
    if (!m) m = work.match(/(?:优先级|优先)\s*[：:]\s*(.+)$/i);
    if (m) {
      var pv = m[1].trim();
      var np = normalizePriorityToken(pv);
      if (np) priority = np;
      else if (/^P[0-3]$/i.test(pv)) priority = pv.toUpperCase();
      work = work.replace(m[0], " ").replace(/\s+/g, " ").trim();
    }
    if (/紧急|高优|最高/.test(work)) priority = "P0";
    if (/低优|较低/.test(work)) priority = "P3";
    if (/完成|已完|搞定|✓|√/.test(lineJoined)) status = "done";
    else if (/进行中|正在做|处理中/.test(lineJoined)) status = "doing";
    else if (/阻塞|卡住/.test(lineJoined)) status = "blocked";
    else if (/评审|待审|审核/.test(lineJoined)) status = "review";
    work = work
      .replace(/^#{1,6}\s+/, "")
      .replace(/^[\-\*•·□]\s+/, "")
      .replace(/^\d+[\.、\)]\s*/, "")
      .replace(/^[(（]\s*\d+\s*[)）]\s*/, "")
      .replace(/^任务\s*(?:\d+|[一二三四五六七八九十百千万零〇两]+)\s*[：:]\s*/i, "")
      .replace(/^Task\s*\d+\s*[：:]\s*/i, "")
      .replace(/^(?:任务|事项|待办|TODO)\s*[：:]\s*/i, "")
      .replace(/\*\*/g, "")
      .trim();
    work = work.replace(/(?:负责人|协作|DDL|截止|deadline)\s*[：:]\s*/gi, "").replace(/\s+/g, " ").trim();
    var title = work.slice(0, 500);
    return {
      title: title,
      description: "",
      assignee: assignee,
      collaborators: collaborators,
      deadline: deadline,
      priority: priority,
      status: status,
      tags: tags.join(","),
    };
  }

  function extractTaskLine(t) {
    var s = stripMarkdownForMeetingLine(String(t || ""));
    if (!s) return null;
    var m;
    var ext = extractMeetingTaskTitleFromMarkerLine(s);
    if (ext !== null) return ext;
    if ((m = s.match(/^任务\s*\d+\s*[：:]\s*(.+)$/i))) return m[1];
    if ((m = s.match(/^[\-\*•·□]\s+(.+)$/))) return m[1];
    if ((m = s.match(/^\d+[\.、\)]\s*(.+)$/))) return m[1];
    if ((m = s.match(/^[(（]\s*\d+\s*[)）]\s*(.+)$/))) return m[1];
    if ((m = s.match(/^第[一二三四五六七八九十百千万零〇两0-9]+[条条项项步步]\s*[:：\.\s]*(.+)$/))) return m[1];
    return null;
  }

  function looksLikeWorkflowSectionHeading(tr) {
    var s = stripMarkdownForMeetingLine(String(tr || ""));
    if (isMeetingTaskMarkerLine(s)) return false;
    if (/^(?:负责人|协作|DDL|截止|优先级|项目|阶段|流程)/i.test(s)) return false;
    if (/^(\d{1,2})\uFE0F\u20E3\s+.+/.test(s)) return true;
    if (/^[0-9]+[️⃣]\s*.+/.test(s)) return true;
    if (/阶段\s*[（(]?[^：:]{0,40}\s*$/.test(s) && !/任务/.test(s) && s.length < 120) return true;
    return false;
  }

  function cleanWorkflowSectionLabel(tr) {
    return stripMarkdownForMeetingLine(String(tr || ""))
      .replace(/^(\d{1,2})\uFE0F\u20E3\s+/, "")
      .replace(/^[0-9]+[️⃣]\s+/, "")
      .replace(/^\d+[\.、\)]\s*/, "")
      .trim()
      .slice(0, 120);
  }

  function looksLikeMetaLine(tr) {
    var s = stripMarkdownForMeetingLine(String(tr || ""));
    return /^(?:项目|会议主题|主题|会议标题|改名|重命名|项目改名|阶段|流程阶段)\s*[：:]/.test(s) || /^串联|顺序任务|线性流程|依次推进/.test(s);
  }

  function parseTaskLine(titleCore, fullLine) {
    var st = parseTaskStructured(fullLine);
    var tc = String(titleCore || "").trim();
    if (tc) {
      var fallback = tc
        .replace(/^#{1,6}\s+/gm, " ")
        .replace(/\*\*/g, " ")
        .replace(/【[^】]*】/g, " ")
        .replace(/@[\u4e00-\u9fa5\w.\-]+/g, " ")
        .replace(/^任务\s*(?:\d+|[一二三四五六七八九十百千万零〇两]+)\s*[：:]\s*/gi, " ")
        .replace(/^Task\s*\d+\s*[：:]\s*/gi, " ")
        .replace(/(?:负责人|责任人|指派|协作|DDL|截止|deadline)\s*[：:]\s*[^\s;；]+/gi, " ")
        .replace(/\bP[0-3]\b/gi, " ")
        .replace(/\s+/g, " ")
        .trim();
      if (fallback.length > 0 && (!st.title || st.title.length < 2 || st.title.length > fallback.length * 2)) {
        st.title = fallback.slice(0, 500);
      }
    }
    if (st.title) st.title = st.title.replace(/\s+/g, " ").trim().slice(0, 500);
    return st;
  }

  function handleMeetingMetaLine(tr, ctx) {
    var m;
    var s = stripMarkdownForMeetingLine(tr);
    if (!s) return false;
    if ((m = s.match(/^(?:阶段|流程阶段)\s*[：:]\s*(.+)$/))) {
      ctx.pipelineStagesFromMeta = true;
      ctx.pipelineStages = m[1]
        .split(/[,，;；\/、|]/)
        .map(function (x) {
          return x.trim();
        })
        .filter(function (x) {
          return x.length > 0;
        });
      return true;
    }
    if ((m = s.match(/^(?:项目|会议主题|主题|会议标题)\s*[：:]\s*(.+)$/))) {
      ctx.projectName = m[1].trim();
      return true;
    }
    if ((m = s.match(/^改名\s*[：:]\s*(.+)$/))) {
      ctx.renameProject = m[1].trim();
      return true;
    }
    if ((m = s.match(/^重命名\s*[：:]\s*(.+)$/))) {
      ctx.renameProject = m[1].trim();
      return true;
    }
    if ((m = s.match(/^项目改名\s*[：:]\s*(.+)$/))) {
      ctx.renameProject = m[1].trim();
      return true;
    }
    if (/串联|顺序任务|线性流程|依次推进|按顺序/.test(s)) {
      ctx.chainHint = true;
      return true;
    }
    return false;
  }

  function tryParseTableRow(tr) {
    if (!/\|/.test(tr)) return null;
    var raw = tr.split("|").map(function (c) {
      return c.trim();
    });
    var parts = [];
    var ri;
    for (ri = 0; ri < raw.length; ri++) {
      if (raw[ri] !== "") parts.push(raw[ri]);
    }
    if (parts.length < 2) return null;
    var joined = parts.join(" ");
    if (/任务|标题|事项|待办/.test(joined) && (/负责人|指派|Owner|执行人/.test(joined) || /截止|DDL|日期/.test(joined))) {
      return "header";
    }
    if (parts.every(function (p) {
      return /^[\s\-:｜|─═]+$/.test(p);
    })) {
      return null;
    }
    var title = parts[0];
    var assignee = parts.length > 1 ? parts[1] : "";
    var deadline = "";
    var pi;
    for (pi = 2; pi < parts.length; pi++) {
      var dm = parts[pi].match(/\d{4}-\d{2}-\d{2}/);
      if (dm) deadline = dm[0];
      var df = parseFlexibleDate(parts[pi]);
      if (df) deadline = df;
    }
    if (!title || /^[-:\s|─]+$/.test(title)) return null;
    var hasFieldLabels = /(?:负责人|协作|DDL|截止|deadline|优先级|优先)\s*[：:]|【\s*P[0-3]\s*】|@/.test(joined);
    if (hasFieldLabels) {
      var st = parseTaskStructured(joined);
      return {
        title: st.title || title,
        assignee: st.assignee || assignee,
        collaborators: st.collaborators || "",
        deadline: st.deadline || deadline,
        priority: st.priority || "P2",
        status: st.status || "todo",
        description: st.description || "",
        tags: st.tags || "",
      };
    }
    return {
      title: title,
      assignee: assignee,
      collaborators: "",
      deadline: deadline,
      priority: "P2",
      status: "todo",
      description: "",
      tags: "",
    };
  }

  function parseMeetingBlocks(blocks, warnings) {
    var ctx = {
      projectName: null,
      renameProject: null,
      chainHint: false,
      pipelineStages: null,
      pipelineStagesFromMeta: false,
      _stageIdx: 0,
    };
    var tasks = [];
    var bi;
    var m;
    for (bi = 0; bi < blocks.length; bi++) {
      var lines = blocks[bi]
        .split(/\n/)
        .map(function (l) {
          return l.replace(/\s+$/, "");
        })
        .filter(function (l) {
          var t = l.trim();
          if (!t) return false;
          if (isMarkdownHrLine(t)) return false;
          return true;
        });
      if (!lines.length) continue;
      var tr = lines[0].trim();
      if (handleMeetingMetaLine(tr, ctx)) continue;
      if (looksLikeWorkflowSectionHeading(tr)) {
        if (!ctx.pipelineStagesFromMeta) {
          if (!ctx.pipelineStages) ctx.pipelineStages = [];
          ctx.pipelineStages.push(cleanWorkflowSectionLabel(tr));
          ctx._stageIdx = ctx.pipelineStages.length - 1;
        }
        continue;
      }
      var tbl = tryParseTableRow(tr);
      if (tbl === "header") continue;
      if (tbl && typeof tbl === "object") {
        tbl.pipelineStage = ctx.pipelineStages && ctx.pipelineStages.length ? ctx._stageIdx : 0;
        tasks.push(tbl);
        continue;
      }
      var joinedForTask = lines.join("\n");
      if (!meetingTextContainsTaskMarker(joinedForTask)) {
        continue;
      }
      var line0 = lines[0];
      var tl = extractTaskLine(line0);
      var core = tl;
      if (tl == null) {
        var ls0 = stripMarkdownForMeetingLine(line0);
        var tmk = extractMeetingTaskTitleFromMarkerLine(ls0);
        if (tmk !== null) core = tmk;
        else if ((m = ls0.match(/^任务\s*\d+\s*[：:]\s*(.+)$/i))) core = m[1].trim();
        else if ((m = ls0.match(/^(?:任务|事项|待办|TODO)\s*[：:]\s*(.+)$/i))) core = m[1].trim();
        else if (!looksLikeMetaLine(line0)) core = line0.trim();
        else continue;
      }
      var fullLine = lines.join(" ");
      var base = parseTaskLine(core, fullLine);
      if (lines.length > 1) mergeTaskFields(base, parseFieldsFromLines(lines.slice(1)));
      base.pipelineStage = ctx.pipelineStages && ctx.pipelineStages.length ? ctx._stageIdx : 0;
      if (base.title) tasks.push(base);
    }
    if (!ctx.projectName && tasks.length && blocks[0]) {
      var firstLine = blocks[0].split(/\n/)[0].trim();
      if (
        firstLine &&
        !/^#{1,6}\s/.test(firstLine) &&
        !extractTaskLine(firstLine) &&
        !looksLikeMetaLine(firstLine) &&
        !looksLikeWorkflowSectionHeading(firstLine) &&
        firstLine.length < 80
      ) {
        ctx.projectName = firstLine;
      }
    }
    if (!tasks.length) warnings.push("未识别到任务。可试：任务1：标题；空行分块；表格；行首 - / 1.；或在线用 AI 结构化。");
    if (tasks.length > 80) warnings.push("任务超过 80 条，仅导入前 80 条。");
    return {
      projectName: ctx.projectName,
      renameProject: ctx.renameProject,
      chainHint: ctx.chainHint,
      pipelineStages: ctx.pipelineStages,
      tasks: tasks.slice(0, 80),
      warnings: warnings,
    };
  }

  function parseMeetingLines(lines, warnings) {
    var ctx = {
      projectName: null,
      renameProject: null,
      chainHint: false,
      pipelineStages: null,
      pipelineStagesFromMeta: false,
      _stageIdx: 0,
    };
    var tasks = [];
    var li;
    var m;
    for (li = 0; li < lines.length; li++) {
      var tr = lines[li].trim();
      if (!tr) continue;
      if (isMarkdownHrLine(tr)) continue;
      if (handleMeetingMetaLine(tr, ctx)) continue;
      if (looksLikeWorkflowSectionHeading(tr)) {
        if (!ctx.pipelineStagesFromMeta) {
          if (!ctx.pipelineStages) ctx.pipelineStages = [];
          ctx.pipelineStages.push(cleanWorkflowSectionLabel(tr));
          ctx._stageIdx = ctx.pipelineStages.length - 1;
        }
        continue;
      }
      var tbl = tryParseTableRow(tr);
      if (tbl === "header") continue;
      if (tbl && typeof tbl === "object") {
        tbl.pipelineStage = ctx.pipelineStages && ctx.pipelineStages.length ? ctx._stageIdx : 0;
        tasks.push(tbl);
        continue;
      }
      var tl = extractTaskLine(tr);
      if (tl != null) {
        var row = parseTaskLine(tl, tr);
        row._acc = tr;
        row.pipelineStage = ctx.pipelineStages && ctx.pipelineStages.length ? ctx._stageIdx : 0;
        tasks.push(row);
        continue;
      }
      var trs = stripMarkdownForMeetingLine(tr);
      if ((m = trs.match(/^(?:任务|事项|待办|TODO)\s*[：:]\s*(.+)$/i))) {
        var row3 = parseTaskLine(m[1].trim(), tr);
        row3._acc = tr;
        row3.pipelineStage = ctx.pipelineStages && ctx.pipelineStages.length ? ctx._stageIdx : 0;
        tasks.push(row3);
        continue;
      }
      if (tasks.length && isContinuationFieldLine(tr)) {
        var last = tasks[tasks.length - 1];
        last._acc = ((last._acc || "") + " " + tr).trim();
        var merged = parseTaskLine(last.title, last._acc.replace(/\n/g, " "));
        mergeTaskFields(last, merged);
        mergeTaskFields(last, parseFieldsFromLines([tr]));
        continue;
      }
      if (tasks.length && !looksLikeMetaLine(tr)) {
        tasks[tasks.length - 1].description = (tasks[tasks.length - 1].description + "\n" + tr).trim();
      }
    }
    if (!ctx.projectName && tasks.length) {
      for (var fi = 0; fi < Math.min(lines.length, 8); fi++) {
        var f = lines[fi].trim();
        if (!f || /^#{1,6}\s/.test(f) || extractTaskLine(f) || looksLikeMetaLine(f) || looksLikeWorkflowSectionHeading(f)) continue;
        if (f.length > 1 && f.length < 80) {
          ctx.projectName = f;
          break;
        }
      }
    }
    if (!tasks.length) warnings.push("未识别到任务行。可试：任务1：标题、- 列表、空行分块、表格；或在线用 AI 结构化。");
    if (tasks.length > 80) warnings.push("任务超过 80 条，仅导入前 80 条。");
    return {
      projectName: ctx.projectName,
      renameProject: ctx.renameProject,
      chainHint: ctx.chainHint,
      pipelineStages: ctx.pipelineStages,
      tasks: tasks.slice(0, 80),
      warnings: warnings,
    };
  }

  function parseMeetingText(text) {
    var warnings = [];
    var raw = trimChatGptMeetingPreamble(String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n"));
    var lines = raw.split(/\r?\n/).map(function (l) {
      return l.replace(/\s+$/, "");
    });
    var hints = extractMeetingProjectHints(lines);
    var scanRes = parseMeetingTaskMarkerScan(lines, warnings);
    var pname = scanRes.projectName || hints.projectName;
    if (hints.periodLine && !pname) {
      warnings.push("已识别项目周期：" + hints.periodLine + "（可作排期参考）");
    }
    if (scanRes.tasks.length) {
      if (scanRes.tasks.length > 80) warnings.push("任务超过 80 条，仅导入前 80 条。");
      return {
        projectName: pname,
        renameProject: scanRes.renameProject,
        chainHint: scanRes.chainHint,
        pipelineStages: scanRes.pipelineStages,
        tasks: scanRes.tasks.slice(0, 80),
        warnings: warnings,
      };
    }
    if (meetingProseLooksLikely(raw)) {
      var proseRes = parseMeetingProseNarrative(raw, warnings);
      if (proseRes.tasks.length) {
        return {
          projectName: pname || proseRes.projectName,
          renameProject: null,
          chainHint: false,
          pipelineStages: null,
          tasks: proseRes.tasks.slice(0, 80),
          warnings: warnings,
        };
      }
    }
    var blocks = raw.split(/\n\s*\n/).map(function (b) {
      return b.trim();
    }).filter(Boolean);
    if (blocks.length >= 2) {
      var blockRes = parseMeetingBlocks(blocks, warnings);
      if (blockRes.tasks.length) {
        if (!blockRes.projectName && pname) blockRes.projectName = pname;
        return blockRes;
      }
      warnings.push("空行分块未识别到任务，已改用逐行规则重试。");
      var lineRes = parseMeetingLines(lines, warnings);
      if (!lineRes.projectName && pname) lineRes.projectName = pname;
      return lineRes;
    }
    var lineRes2 = parseMeetingLines(lines, warnings);
    if (!lineRes2.projectName && pname) lineRes2.projectName = pname;
    return lineRes2;
  }

  function normalizeAiMeetingParsed(o) {
    var warnings = [];
    if (!o || typeof o !== "object") {
      return { projectName: null, renameProject: null, chainHint: false, pipelineStages: null, tasks: [], warnings: ["AI 返回无效"] };
    }
    var tasks = Array.isArray(o.tasks) ? o.tasks : [];
    var out = [];
    var ti;
    for (ti = 0; ti < tasks.length; ti++) {
      var t = tasks[ti];
      if (!t || typeof t !== "object") continue;
      var title = String(t.title || "").trim();
      if (!title) continue;
      var pr = String(t.priority || "P2").toUpperCase();
      if (!/^P[0-3]$/.test(pr)) pr = "P2";
      var st = String(t.status || "todo");
      if (!/^(todo|doing|blocked|review|done)$/.test(st)) st = "todo";
      var psg = t.pipelineStage;
      var psOut = 0;
      if (psg !== undefined && psg !== null && psg !== "") {
        var pn = parseInt(psg, 10);
        if (!isNaN(pn) && pn >= 0) psOut = pn;
      }
      out.push({
        title: title.slice(0, 500),
        description: String(t.description || "").trim(),
        assignee: String(t.assignee || "").trim(),
        collaborators: String(t.collaborators || "").trim(),
        deadline: String(t.deadline || "").match(/\d{4}-\d{2}-\d{2}/) ? String(t.deadline).match(/\d{4}-\d{2}-\d{2}/)[0] : "",
        priority: pr,
        status: st,
        tags: String(t.tags || "").trim(),
        pipelineStage: psOut,
      });
    }
    return {
      projectName: o.projectName ? String(o.projectName).trim() : null,
      renameProject: o.renameProject ? String(o.renameProject).trim() : null,
      chainHint: !!o.chainHint,
      pipelineStages: Array.isArray(o.pipelineStages) ? o.pipelineStages.map(String) : null,
      tasks: out.slice(0, 80),
      warnings: warnings,
    };
  }

  function parseMeetingTextWithAI(text, done) {
    if (!canUseAiMeetingParse()) {
      done({ err: "AI 已禁用（页面设置了 DISABLE_MEETING_AI）。" });
      return;
    }
    if (!meetingAiApiBase()) {
      done({
        err:
          "未配置会议纪要 AI 服务地址。请在页面脚本中设置 WORKGRAPH_AI_PARSE_ORIGIN_FALLBACK，或执行：localStorage.setItem(\"workgraph_ai_api_base\",\"https://你的域名\")",
      });
      return;
    }
    var txtAi = trimChatGptMeetingPreamble(String(text || ""));
    if (!txtAi.trim()) {
      done({ err: "正文在去前言后为空，请保留至少含「任务1：」或「#」标题的排期段落。" });
      return;
    }
    meetingAiFetch("/api/ai/parse-meeting", { method: "POST", body: { text: txtAi } })
      .then(function (r) {
        return r.text().then(function (bodyText) {
          var j = null;
          try {
            j = bodyText && bodyText.length ? JSON.parse(bodyText) : {};
          } catch (parseErr) {
            j = {
              ok: false,
              error: "服务器返回非 JSON（HTTP " + r.status + "）",
              detail: String(bodyText || "").slice(0, 240),
            };
          }
          return { ok: r.ok, status: r.status, data: j };
        });
      })
      .then(function (res) {
        if (!res.ok && res.status === 404) {
          done({
            err:
              "API 不存在（404）。请确认：① Vercel 等公网部署已包含 /api/ai/parse-meeting；② 本地已运行 task-server（默认 3780）且页面与 API 同址；③ 若端口不一致，可执行：localStorage.setItem(\"workgraph_api_base\",\"http://主机:端口\") 后刷新。",
          });
          return;
        }
        if (!res.ok || !res.data || !res.data.ok || !res.data.parsed) {
          var msg = (res.data && res.data.error) || "AI 解析失败";
          if (res.data && res.data.detail) msg += "：" + res.data.detail;
          if (!res.ok && res.status === 401) msg = "未登录或会话失效，请重新登录后再试 AI 解析。";
          if (!res.ok && res.status === 503) msg = (res.data && res.data.error) || msg;
          done({ err: msg });
          return;
        }
        done({ parsed: normalizeAiMeetingParsed(res.data.parsed) });
      })
      .catch(function (e) {
        var hint = e && e.message ? String(e.message) : String(e);
        done({
          err:
            "请求失败（" +
            hint +
            "）。请确认：① 通过 http(s) 打开；② 公网部署已在服务端配置 OPENAI_API_KEY；③ 本地 task-server 已启动且 OPENAI_API_KEY 已设置。",
        });
      });
  }

  function formatMeetingPreview(p) {
    var s = "";
    var w;
    for (w = 0; w < p.warnings.length; w++) {
      s += "⚠ " + p.warnings[w] + "\n";
    }
    if (p.projectName) s += "项目名（新建时）: " + p.projectName + "\n";
    if (p.renameProject) s += "将项目重命名为: " + p.renameProject + "\n";
    if (p.chainHint) s += "正文含串联类关键词: 是\n";
    if (p.pipelineStages && p.pipelineStages.length) s += "流程阶段: " + p.pipelineStages.join(" → ") + "\n";
    s += "任务 " + p.tasks.length + " 条：\n";
    for (var i = 0; i < p.tasks.length; i++) {
      var t = p.tasks[i];
      s += "  " + (i + 1) + ". " + t.title;
      if (p.pipelineStages && p.pipelineStages.length && t.pipelineStage != null && p.pipelineStages[t.pipelineStage]) {
        s += " · 阶段 " + p.pipelineStages[t.pipelineStage];
      }
      if (t.assignee) s += " · 负责人 " + t.assignee;
      if (t.collaborators) s += " · 协作 " + t.collaborators;
      if (t.deadline) s += " · 截止 " + t.deadline;
      if (t.tags) s += " · 标签 " + t.tags;
      s += " · " + t.status + " " + t.priority + "\n";
    }
    return s || "（无可预览内容）";
  }

  function applyMeetingImport(parsed, mode, projectId, flags) {
    flags = flags || {};
    var uname = state.userName;

    var proj;
    if (mode === "new") {
      var defaultName = "导入项目 " + new Date().toISOString().slice(0, 10);
      var name = (parsed.projectName && parsed.projectName.trim()) || defaultName;
      var chain = !!flags.chain;
      var stages;
      if (chain) {
        stages = [];
      } else if (parsed.pipelineStages && parsed.pipelineStages.length) {
        stages = parsed.pipelineStages.slice();
      } else {
        stages = ["流程"];
      }
      proj = {

        name: name.slice(0, 200),
        archived: false,
        createdAt: new Date().toISOString(),
        pipelineStages: stages,
      };
      if (chain) proj.chainMode = true;
      state.projects.push(proj);
      targetId = proj.id;
    } else {
      proj = state.projects.find(function (x) {
        return x.id === projectId;

      if (parsed.renameProject && parsed.renameProject.trim()) {

      if (flags.overwriteStages && parsed.pipelineStages && parsed.pipelineStages.length && !isChainProject(proj)) {
        proj.pipelineStages = parsed.pipelineStages.slice();

    }
    var ch = isChainProject(proj);
    var stageMax = !ch && proj.pipelineStages && proj.pipelineStages.length ? proj.pipelineStages.length - 1 : 0;
    var ti;
    for (ti = 0; ti < parsed.tasks.length; ti++) {
      var pt = parsed.tasks[ti];
      if (!pt.title || !String(pt.title).trim()) continue;
      var psRaw = pt.pipelineStage;
      var ps = 0;
      if (!ch && psRaw !== undefined && psRaw !== null && psRaw !== "") {
        ps = parseInt(psRaw, 10);
        if (isNaN(ps) || ps < 0) ps = 0;
        else if (ps > stageMax) ps = stageMax;
      }
      var t = {
        id: uid(),
        projectId: targetId,
        title: String(pt.title).trim().slice(0, 500),
        description: (pt.description || "").trim(),
        status: pt.status || "todo",
        priority: pt.priority || "P2",
        assignee: (pt.assignee || "").trim() || uname,
        collaborators: (pt.collaborators || "").trim(),
        createdBy: uname,
        parentId: null,
        pipelineStage: ch ? 0 : ps,
        startTime: "",
        deadline: pt.deadline || "",
        estimatedHours: "",
        actualHours: "",
        tags: (pt.tags || "").trim(),
      };
      if (ch) {
        t.pipelineStage = 0;
        t.chainOrder = nextChainOrder(targetId);
      }
      state.tasks.push(t);
    }
    save(state);
    state.currentProjectId = targetId;
    state.view = "projects";
    state.workspaceTab = "flow";
    state.showFlowOverlay = false;

        var r = applyMeetingImport(parsed, mode, append ? pid : null, {
          chain: chain,

        });

          alert(r.msg || "导入失败");
          return;
        }

      });

  function syncHashFromState() {
    if (!state) return;
    if (__hashLock) return;
    var want = "";
    if (state.view === "projects" && state.currentProjectId) {
      want = "#/project/" + encodeURIComponent(state.currentProjectId);
    } else if (state.view === "projects") {
      want = "#/projects";
    } else if (state.view === "schedule") {
      want = "#/schedule";
    } else if (state.view === "ai") {
      want = "#/ai";
    } else if (state.view === "profile") {
      want = "#/profile";
    } else {
      want = "";
    }
    if (/^#\/project\//.test(location.hash) && state.view !== "projects") {
      want = "";
    }
    if (want === "" && (location.hash.indexOf("#/project/") === 0 || location.hash === "#/schedule" || location.hash === "#/ai" || location.hash === "#/projects" || location.hash === "#/profile")) {
      __hashLock = true;
      location.hash = "";
      setTimeout(function () {
        __hashLock = false;
      }, 0);
      return;
    }
    if (location.hash !== want) {
      __hashLock = true;
      location.hash = want;
      setTimeout(function () {
        __hashLock = false;
      }, 0);
    }
  }

  function bindAuthScreen() {

    var panelUp = document.getElementById("auth-panel-up");

    function setMsg(t) {
      if (msg) msg.textContent = t || "";
    }
    if (tabIn && tabUp && panelIn && panelUp) {
      tabIn.onclick = function () {
        tabIn.classList.add("active");
        tabUp.classList.remove("active");
        panelIn.classList.remove("hidden");
        panelUp.classList.add("hidden");
        setMsg("");
      };
      tabUp.onclick = function () {
        tabUp.classList.add("active");

                    .then(function (res3) {

                    });

            .then(function (authData) {

          setMsg("用户名至少 2 个字符");
          return;
        }
        if (pw.length < 6) {

          return;
        }
        if (pw !== pw2) {
          setMsg("两次密码不一致");
          return;

        if (useServerStorage()) {
          apiFetch("/api/register", { method: "POST", body: { username: u, password: pw } })
            .then(function (r) {

                return { ok: r.ok, data: j };
              });
            })
            .then(function (res) {
              if (res.ok && res.data && res.data.ok) {
                persistWorkgraphTokenFromResponse(res.data);

                setSession(activeAccount);
                state = emptyState(activeAccount);
                postLoadState(state);
                save(state);

                connectRealtimeSocket();
                render();

              }
              setMsg((res.data && res.data.error) || "注册失败");
            })
            .catch(function () {
              setMsg("网络错误，请检查服务是否已启动");

          return;
        }

        if (

            return a.username === u;

        ) {
          setMsg("用户名已存在");

        sha256Hex(pw).then(function (hash) {
          auth.accounts.push({ username: u, passHash: hash });
          saveAuth(auth);
          var migrated = migrateLegacyToUser(u);
          if (!migrated) {

            try {

            } catch (e) {}

          setSession(u);
          activeAccount = u;
          state = loadForUser(u);
          syncSavedSnapshotFromState(state);
          applyRouteFromHash();
          render();
        });

  function renderDashboardOverviewCard() {
    var list = state.projects.filter(function (p) {
      return !p.archived;
    });
    var stats = list.map(function (p) {
      var ts = tasksOfProject(state, p.id);
      var done = ts.filter(function (t) {
        return t.status === "done";
      }).length;
      var blocked = ts.filter(function (t) {
        return t.status === "blocked";
      }).length;
      var overdue = ts.filter(function (t) {
        if (!t.deadline || t.status === "done") return false;
        return new Date(t.deadline) < new Date();
      }).length;
      var rate = ts.length ? Math.round((done / ts.length) * 100) : 0;
      var health = Math.max(0, Math.min(100, rate - blocked * 5 - overdue * 3));
      return { p: p, total: ts.length, done: done, blocked: blocked, overdue: overdue, rate: rate, health: health };
    });
    var rows = "";
    for (var i = 0; i < stats.length; i++) {
      var s = stats[i];
      rows +=
        '<tr><td>' + esc(s.p.name) + "</td><td>" + s.total + "</td><td>" + s.rate + "%</td><td>" + s.blocked + "</td><td>" + s.overdue + "</td><td>" + s.health + "</td>" +
        '<td><button type="button" class="btn btn-sm" data-open-project="' + esc(s.p.id) + '">进入</button></td></tr>';
    }
    return (
      '<div class="card"><h2 style="font-size:1rem;margin-bottom:0.5rem">项目概览</h2>' +
      (stats.length === 0
        ? '<p class="muted">暂无项目。请点侧栏「<strong>项目</strong>」→「＋ 新建项目」；或点「恢复示例」载入演示。</p>'

  /** 工作台筛选：同时匹配标题/标签/描述；无标题或仅空白的任务在有关键词时也保留（避免新建并列被筛掉） */
  function taskMatchesWorkspaceTextQuery(t, q) {
    if (!q) return true;
    var rawTitle = String(t.title != null ? t.title : "");
    if (rawTitle.toLowerCase().indexOf(q) !== -1) return true;
    if (String(t.tags || "").toLowerCase().indexOf(q) !== -1) return true;
    if (String(t.description || "").toLowerCase().indexOf(q) !== -1) return true;
    if (!rawTitle.trim() && t.status === "todo") return true;
    return false;
  }

  function getFilteredTasks(proj) {
    var q = (document.getElementById("filter-q") && document.getElementById("filter-q").value) || "";
    var tag = (document.getElementById("filter-tag") && document.getElementById("filter-tag").value) || "";
    q = q.trim().toLowerCase();
    tag = tag.trim().toLowerCase();
    return tasksOfProject(state, proj.id).filter(function (t) {
      if (q && !taskMatchesWorkspaceTextQuery(t, q)) return false;
      if (tag && String(t.tags || "").toLowerCase().indexOf(tag) === -1) return false;
      return true;
    });
  }

  function renderWorkspaceBody(proj) {
    var body = document.getElementById("workspace-body");
    if (!body) return;
    var ts = getFilteredTasks(proj);
    var ch = isChainProject(proj);
    var hint = ch
        ? '<p class="muted" style="margin:0 0 0.55rem;font-size:12px">卡片空白处打开详情；底部可「下方插入/插入并列」同级、「子任务」下级、编辑、删除。</p>'
        : '<p class="muted" style="margin:0 0 0.55rem;font-size:12px">卡片空白处打开详情；底部可插入并列、子任务、编辑、删除。</p>';
    var banner = ch ? renderChainProgressBanner(proj, ts) : renderPipelineProgressBanner(proj, ts);
    var strip = ch ? renderChainStrip(proj, ts) : renderPipelineStrip(proj, ts);
    var relViz = renderGraph(proj, tasksOfProject(state, proj.id));
    body.innerHTML = '<div class="card">' + banner + hint + renderFlowLegend(proj) + strip + "</div>" + relViz;
  }

  function childrenOf(ts, parentId) {
    return ts.filter(function (t) { return t.parentId === parentId; });
  }

  function renderTreeNode(proj, ts, t, depth) {
    var ch = childrenOf(ts, t.id);
    var sub = "";
    for (var i = 0; i < ch.length; i++) {
      sub += renderTreeNode(proj, ts, ch[i], depth + 1);
    }
    return (
      '<div class="tree-row" style="--depth:' + depth + '"><button type="button" class="btn btn-sm" data-open="' + esc(t.id) + '">' + esc(t.title) + "</button> " +
      '<span class="' + badgeClass(t.status) + '">' + esc(t.status) + "</span></div>" +
      sub
    );
  }

  function renderTree(proj, ts) {
    var roots = ts.filter(function (t) { return !t.parentId || !ts.some(function (x) { return x.id === t.parentId; }); });
    var html = "";
    for (var i = 0; i < roots.length; i++) {
      html += renderTreeNode(proj, ts, roots[i], 0);
    }
    return '<div class="card tree">' + (html || '<p class="muted">无任务</p>') + "</div>";
  }

  function renderTimeline(proj, ts) {
    var rows = "";
    var sorted = ts.slice().sort(function (a, b) {
      var da = a.startTime || a.deadline || "";
      var db = b.startTime || b.deadline || "";
      return da.localeCompare(db);
    });
    for (var i = 0; i < sorted.length; i++) {
      var t = sorted[i];
      rows +=
        '<div class="card" style="padding:0.6rem 0.75rem;margin-bottom:0.45rem">' +

        '<span class="muted">' + esc(t.startTime || "—") + " → " + esc(t.deadline || "—") + "</span></div>";
    }
    return '<div class="card"><h2 style="font-size:1rem">时间轴（点击标题打开详情）</h2>' + (rows || '<p class="muted">无</p>') + "</div>";
  }

  function weekMondayStart() {
    var off = (state.scheduleWeekOffset || 0) * 7;
    var now = new Date();
    now.setDate(now.getDate() + off);
    var d = now.getDay();
    var diff = (d === 0 ? -6 : 1) - d;
    var monday = new Date(now);
    monday.setDate(now.getDate() + diff);
    monday.setHours(0, 0, 0, 0);
    return monday;
  }

  function ymdFromDate(dt) {
    return dt.getFullYear() + "-" + pad2(dt.getMonth() + 1) + "-" + pad2(dt.getDate());
  }

  function mondayOfThisWeekNatural() {
    var now = new Date();
    var d = now.getDay();
    var diff = (d === 0 ? -6 : 1) - d;
    var monday = new Date(now);
    monday.setDate(now.getDate() + diff);
    monday.setHours(0, 0, 0, 0);
    return monday;
  }

  function buildWeeklyWorkReportText() {
    var mon = mondayOfThisWeekNatural();
    var sun = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    var weekStart = ymdFromDate(mon);
    var weekEnd = ymdFromDate(sun);
    var today = ymdFromDate(new Date());
    var lines = [];
    lines.push("【周度工作报告】（本地规则生成，非联网大模型）");
    lines.push("汇报周期：" + weekStart + "（周一）～ " + weekEnd + "（周日）");
    lines.push("生成基准日：" + today + " · 账号：" + (state.userName || "—"));
    lines.push("");

    var all = state.tasks;
    var done = all.filter(function (t) {
      return t.status === "done";
    });
    var doing = all.filter(function (t) {
      return t.status === "doing";
    });
    var blocked = all.filter(function (t) {
      return t.status === "blocked";
    });
    var todo = all.filter(function (t) {
      return t.status === "todo";
    });
    var review = all.filter(function (t) {
      return t.status === "review";
    });
    var n = all.length;
    var rate = n ? Math.round((done.length / n) * 100) : 0;

    var pList = state.projects.filter(function (p) {
      return !p.archived;
    });
    lines.push("一、总体概况");
    lines.push("- 活跃项目：" + pList.length + " 个（未归档）");
    lines.push(
      "- 任务合计：" +
        n +
        " 条 — 已完成 " +
        done.length +
        " · 进行中 " +
        doing.length +
        " · 阻塞 " +
        blocked.length +
        " · 待办 " +
        todo.length +
        " · 评审 " +
        review.length
    );
    lines.push("- 整体任务完成率：约 " + rate + "%");
    lines.push("");

    lines.push("二、项目进展（按项目）");
    if (!pList.length) {
      lines.push("（暂无活跃项目）");
    } else {
      for (var pi = 0; pi < pList.length; pi++) {
        var p = pList[pi];
        var ts = tasksOfProject(state, p.id);
        var td = ts.filter(function (t) {
          return t.status === "done";
        }).length;
        var tg = ts.filter(function (t) {
          return t.status === "doing";
        }).length;
        var tb = ts.filter(function (t) {
          return t.status === "blocked";
        }).length;
        var tr = ts.filter(function (t) {
          return t.status === "review";
        }).length;
        var tt = ts.length;
        var pr = tt ? Math.round((td / tt) * 100) : 0;
        lines.push("■ " + p.name);
        lines.push(
          "  · 任务 " +
            tt +
            " 条：已完成 " +
            td +
            " · 进行中 " +
            tg +
            " · 阻塞 " +
            tb +
            " · 评审 " +
            tr +
            " · 项目内完成率约 " +
            pr +
            "%"
        );
        var keyDoing = ts
          .filter(function (t) {
            return t.status === "doing" && taskPriorityRank(t.priority) <= 1;
          })
          .slice(0, 4);
        if (keyDoing.length) {
          lines.push("  · 重点推进（P0/P1 进行中）：");
          for (var k = 0; k < keyDoing.length; k++) {
            lines.push("    - 「" + keyDoing[k].title + "」");
          }
        }
        if (tb > 0) {
          var bl = ts.filter(function (t) {
            return t.status === "blocked";
          });
          lines.push("  · 阻塞项（" + tb + "）：");
          for (var b = 0; b < Math.min(bl.length, 4); b++) {
            lines.push("    - 「" + bl[b].title + "」");
          }
        }
        lines.push("");
      }
    }

    lines.push("三、完成工作（状态为「完成」的任务汇总）");
    if (!done.length) {
      lines.push("（当前无已完成任务；将任务标为完成后可在此列出。）");
      lines.push("说明：当前数据未记录「完成时间」，周报按「当前快照」统计；若需按自然周精确归档，可后续扩展完成时间字段。");
    } else {
      lines.push("共 " + done.length + " 条：");
      var maxL = 30;
      for (var d = 0; d < Math.min(done.length, maxL); d++) {
        lines.push("  ✓ " + done[d].title);
      }
      if (done.length > maxL) {
        lines.push("  … 等共 " + done.length + " 条");
      }
    }
    lines.push("");

    lines.push("四、风险与延期");
    var overdue = all.filter(function (t) {
      return t.deadline && t.status !== "done" && String(t.deadline).slice(0, 10) < today;
    });
    var p0open = all.filter(function (t) {
      return t.status !== "done" && String(t.priority || "").toUpperCase().indexOf("P0") === 0;
    });
    lines.push("- 已延期（deadline 早于今日且未完成）：" + overdue.length + " 条");
    if (overdue.length && overdue.length <= 8) {
      for (var oi = 0; oi < overdue.length; oi++) {
        lines.push("  · 「" + overdue[oi].title + "」 截止 " + String(overdue[oi].deadline).slice(0, 10));
      }
    }
    lines.push("- 未完成 P0 任务：" + p0open.length + " 条");
    lines.push("- 阻塞任务：" + blocked.length + " 条");
    lines.push("");

    var weekDue = all.filter(function (t) {
      if (t.status === "done" || !t.deadline) return false;
      var ds = String(t.deadline).slice(0, 10);
      return ds >= weekStart && ds <= weekEnd;
    });
    weekDue.sort(function (a, b) {
      return String(a.deadline).localeCompare(String(b.deadline));
    });
    lines.push("五、本周关键节点（本周内有 deadline 的未完成任务）");
    if (!weekDue.length) {
      lines.push("（无）");
    } else {
      for (var wi = 0; wi < weekDue.length; wi++) {
        var w = weekDue[wi];
        lines.push(
          "  · " +
            String(w.deadline).slice(0, 10) +
            " 「" +
            w.title +
            "」 " +
            (w.priority || "P2")
        );
      }
    }
    lines.push("");

    var nextMon = new Date(mon);
    nextMon.setDate(mon.getDate() + 7);
    var nextSun = new Date(nextMon);
    nextSun.setDate(nextMon.getDate() + 6);
    var n1 = ymdFromDate(nextMon);
    var n2 = ymdFromDate(nextSun);
    var nextWeekDue = all.filter(function (t) {
      if (t.status === "done" || !t.deadline) return false;
      var ds = String(t.deadline).slice(0, 10);
      return ds >= n1 && ds <= n2;
    });
    nextWeekDue.sort(function (a, b) {
      return String(a.deadline).localeCompare(String(b.deadline));
    });
    lines.push("六、下周关注点（deadline 落在下一自然周的未完成任务）");
    if (!nextWeekDue.length) {
      lines.push("（无或尚未排期）");
    } else {
      for (var ni = 0; ni < nextWeekDue.length; ni++) {
        var nw = nextWeekDue[ni];
        lines.push(
          "  · " +
            String(nw.deadline).slice(0, 10) +
            " 「" +
            nw.title +
            "」 " +
            (nw.priority || "P2")
        );
      }
    }
    lines.push("");
    lines.push("— 以上为结构化摘要，可直接粘贴到邮件或文档中微调措辞 —");
    return lines.join("\n");
  }

  function buildScheduleAiDailyText(ts) {
    var today = ymdFromDate(new Date());
    var lines = ["【日度计划】" + today + "（本地规则：含今日与未来约 7 日）", ""];
    var overdue = ts.filter(function (t) {
      return t.deadline && String(t.deadline).slice(0, 10) < today;
    });
    overdue.sort(function (a, b) {
      return taskPriorityRank(a.priority) - taskPriorityRank(b.priority);
    });
    if (overdue.length) {
      lines.push("■ 已延期（建议优先清理）");
      for (var o = 0; o < overdue.length; o++) {
        lines.push(
          "  · 「" +
            overdue[o].title +
            "」 截止 " +
            String(overdue[o].deadline).slice(0, 10) +
            " · " +
            (overdue[o].priority || "P2")
        );
      }
      lines.push("");
    }
    var focus = ts.filter(function (t) {
      var dl = t.deadline && String(t.deadline).slice(0, 10);
      var st = t.startTime && String(t.startTime).slice(0, 10);
      return dl === today || st === today;
    });
    focus.sort(function (a, b) {
      return taskPriorityRank(a.priority) - taskPriorityRank(b.priority);
    });
    lines.push("■ 今日焦点（开始或截止落在今日）");
    if (!focus.length) {
      lines.push("  （无）");
    } else {
      for (var f = 0; f < focus.length; f++) {
        var ft = focus[f];
        var fdl = ft.deadline && String(ft.deadline).slice(0, 10) === today;
        lines.push(
          "  " +
            (f + 1) +
            ". 「" +
            ft.title +
            "」 — " +
            (fdl ? "截止" : "开始") +
            " · " +
            (ft.priority || "P2")
        );
      }
    }
    lines.push("");
    lines.push("■ 未来 7 日内截止");
    var anySoon = false;
    for (var day = 1; day <= 7; day++) {
      var d = new Date();
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + day);
      var ds = ymdFromDate(d);
      var row = ts.filter(function (t) {
        return t.deadline && String(t.deadline).slice(0, 10) === ds;
      });
      if (!row.length) continue;
      anySoon = true;
      row.sort(function (a, b) {
        return taskPriorityRank(a.priority) - taskPriorityRank(b.priority);
      });
      lines.push("  " + ds + "：");
      for (var r = 0; r < row.length; r++) {
        lines.push("    · 「" + row[r].title + "」 " + (row[r].priority || "P2"));
      }
    }
    if (!anySoon) {
      lines.push("  （无 upcoming deadline）");
    }
    lines.push("");
    var noschedule = ts.filter(function (t) {
      if (t.deadline) return false;
      return t.status === "doing" || t.status === "blocked" || t.status === "review";
    });
    lines.push("■ 无截止日期但进行中 / 阻塞 / 评审");
    if (!noschedule.length) {
      lines.push("  （无）");
    } else {
      for (var n = 0; n < noschedule.length; n++) {
        var nt = noschedule[n];
        lines.push(
          "  · 「" + nt.title + "」 " + (STATUS_LABEL[nt.status] || nt.status) + " · " + (nt.priority || "P2")
        );
      }
    }
    lines.push("");
    lines.push("■ 节奏建议：上午处理延期与今日截止；下午推进阻塞与近日 DDL；无日期事项穿插填空。");
    return lines.join("\n");
  }

  function buildScheduleAiWeeklyText(ts) {
    var monday = weekMondayStart();
    var dayNames = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
    var last = new Date(monday);
    last.setDate(monday.getDate() + 6);
    var lines = [
      "【周度计划表】" + ymdFromDate(monday) + " ~ " + ymdFromDate(last) + "（与上方周历一致）",
      ""
    ];
    var total = 0;
    for (var di = 0; di < 7; di++) {
      var dt = new Date(monday);
      dt.setDate(monday.getDate() + di);
      var ds = ymdFromDate(dt);
      var dayTasks = ts.filter(function (t) {
        var dl = t.deadline && String(t.deadline).slice(0, 10) === ds;
        var st = t.startTime && String(t.startTime).slice(0, 10) === ds;
        return dl || st;
      });
      dayTasks.sort(function (a, b) {
        return taskPriorityRank(a.priority) - taskPriorityRank(b.priority);
      });
      lines.push(dayNames[di] + " " + ds);
      if (!dayTasks.length) {
        lines.push("  （当日无开始/截止落点）");
      } else {
        total += dayTasks.length;
        for (var j = 0; j < dayTasks.length; j++) {
          var tt = dayTasks[j];
          var mark = tt.deadline && String(tt.deadline).slice(0, 10) === ds ? "截止" : "开始";
          lines.push(
            "  · 「" + tt.title + "」 " + mark + " · " + (tt.priority || "P2") + " · " + (STATUS_LABEL[tt.status] || tt.status)
          );
        }
      }
      lines.push("");
    }
    lines.push("合计：" + total + " 条日程落点；阻塞项建议单独跟进。");
    return lines.join("\n");
  }

  function buildScheduleAiTodoText(ts) {
    var today = ymdFromDate(new Date());
    var ranked = ts.slice().sort(function (a, b) {
      var da = a.deadline ? String(a.deadline).slice(0, 10) : "9999-12-31";
      var db = b.deadline ? String(b.deadline).slice(0, 10) : "9999-12-31";
      var oa = da < today ? 0 : 1;
      var ob = db < today ? 0 : 1;
      if (oa !== ob) return oa - ob;
      if (da !== db) return da.localeCompare(db);
      return taskPriorityRank(a.priority) - taskPriorityRank(b.priority);
    });
    var lines = ["【待办清单】延期优先 → 截止升序 → 优先级", ""];
    for (var i = 0; i < ranked.length; i++) {
      var t = ranked[i];
      var dl = t.deadline ? String(t.deadline).slice(0, 10) : "无截止";
      var tag = t.deadline && String(t.deadline).slice(0, 10) < today ? "[延期] " : "";
      lines.push(
        "□ " +
          tag +
          "「" +
          t.title +
          "」  " +
          (t.priority || "P2") +
          "  ·  " +
          dl +
          "  ·  " +
          (STATUS_LABEL[t.status] || t.status)
      );
    }
    if (!ranked.length) {
      lines.push("（当前筛选下无待办）");
    }
    return lines.join("\n");
  }

  function renderGraph(proj, ts) {
    var n = ts.length;
    var cx = 160;
    var cy = 160;
    var r = 120;
    var edges = "";
    var rels = state.relations.filter(function (r) {
      return ts.some(function (t) { return t.id === r.fromId; }) && ts.some(function (t) { return t.id === r.toId; });
    });
    var pos = {};
    for (var i = 0; i < ts.length; i++) {
      var angle = (i / Math.max(ts.length, 1)) * Math.PI * 2 - Math.PI / 2;
      pos[ts[i].id] = { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle), t: ts[i] };
    }
    for (var j = 0; j < rels.length; j++) {
      var rr = rels[j];
      var a = pos[rr.fromId];
      var b = pos[rr.toId];
      if (!a || !b) continue;
      var col = rr.kind === "blocks" ? "#ef4444" : rr.kind === "depends" ? "#eab308" : "#64748b";
      edges +=
        '<line x1="' + a.x + '" y1="' + a.y + '" x2="' + b.x + '" y2="' + b.y + '" stroke="' + col + '" stroke-width="1.5" marker-end="url(#arr)" />';
    }
    var nodes = "";
    for (var k = 0; k < ts.length; k++) {
      var t = ts[k];
      var p = pos[t.id];
      nodes +=
        '<g data-open="' + esc(t.id) + '" style="cursor:pointer">' +
        '<circle cx="' + p.x + '" cy="' + p.y + '" r="18" fill="#fff" stroke="#2563eb" stroke-width="2" />' +
        '<text x="' + p.x + '" y="' + (p.y + 4) + '" text-anchor="middle" fill="#1e293b" font-size="9">' + esc(t.title.slice(0, 4)) + "</text></g>";
    }
    return (
      '<div class="card"><h2 style="font-size:1rem">关系图谱（依赖/关联 · 点击节点）</h2>' +
      '<p class="muted">父子关系由 parentId 体现；depends / blocks / related 见连线颜色。</p>' +
      '<div class="graph-box"><svg viewBox="0 0 320 320" width="100%" height="100%">' +
      '<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b" /></marker></defs>' +
      edges + nodes +
      "</svg></div></div>"
    );
  }

  function bindProjects() {
    var joinBtn = document.getElementById("btn-join-project");
    var joinInp = document.getElementById("join-project-id");
    if (joinBtn && joinInp) {
      joinBtn.onclick = function () {
        var raw = (joinInp.value || "").trim();
        if (!raw) {
          alert("请输入项目 ID 或项目名称");
          return;
        }
        if (raw.indexOf("WGSHARE1:") === 0 || raw.charAt(0) === "{") {
          var dec1 = decodeShareBundleInput(raw);
          if (dec1.err) {
            alert(dec1.err);
            return;
          }
          importSharedBundleIntoState(dec1.bundle);
          save(state);
          joinInp.value = "";
          state.view = "projects";
          state.showFlowOverlay = false;
          state.workspaceTab = "flow";
          var np1 = state.projects.find(function (q) {
            return q.id === state.currentProjectId;
          });
          alert("已从分享码导入：" + (np1 ? np1.name : ""));
          render();
          return;
        }
        var p = state.projects.find(function (x) {
          return x.id === raw;
        });
        if (!p) {
          p = state.projects.find(function (x) {
            return x.name === raw;
          });
        }
        if (p) {
          state.currentProjectId = p.id;
          state.view = "projects";
          state.showFlowOverlay = false;
          state.workspaceTab = "flow";
          joinInp.value = "";
          render();
          return;
        }
        function afterLocalAccountsFail() {
          var joined = tryJoinProjectFromOtherAccounts(raw);
          if (joined && joined.bundle) {
            var jp = importSharedBundleKeepProjectId(joined.bundle);
            save(state);
            joinInp.value = "";
            state.currentProjectId = jp;
            state.view = "projects";
            state.showFlowOverlay = false;
            state.workspaceTab = "flow";
            alert(
              "已加入账号「" +
                joined.owner +
                "」的项目：" +
                (joined.bundle.project && joined.bundle.project.name ? joined.bundle.project.name : "")
            );
            render();
            return;
          }
          alert("未找到该项目。在线模式下可输入其他用户提供的项目 ID；本机模式可尝试本账号 ID/名称或多账号本地数据。");
        }
        if (useServerStorage()) {
          apiFetch("/api/shared-project/lookup", { method: "POST", body: { projectId: raw } })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data && data.ok && data.bundle) {
                var jp = importSharedBundleKeepProjectId(data.bundle);
                var prJoin = state.projects.find(function (x) {
                  return x.id === jp;
                });
                if (prJoin) prJoin.realtimeSync = true;
                connectRealtimeSocket();
                save(state);
                joinInp.value = "";
                state.currentProjectId = jp;
                state.view = "projects";
                state.showFlowOverlay = false;
                state.workspaceTab = "flow";
                var pn = data.bundle.project && data.bundle.project.name ? data.bundle.project.name : "";
                alert("已加入用户「" + (data.ownerUsername || "") + "」的项目（已开启实时同步）：" + pn);
                render();
                return;
              }
              afterLocalAccountsFail();
            })
            .catch(function () {
              afterLocalAccountsFail();
            });
          return;
        }
        afterLocalAccountsFail();
      };
    }
    var joinShareBtn = document.getElementById("btn-join-share");
    var joinShareTa = document.getElementById("join-share-ta");
    if (joinShareBtn && joinShareTa) {
      joinShareBtn.onclick = function () {
        var raw = (joinShareTa.value || "").trim();
        var dec = decodeShareBundleInput(raw);
        if (dec.err) {
          alert(dec.err);
          return;
        }
        importSharedBundleIntoState(dec.bundle);
        save(state);
        joinShareTa.value = "";
        state.view = "projects";
        state.workspaceTab = "flow";
        state.showFlowOverlay = false;
        var np = state.projects.find(function (q) {
          return q.id === state.currentProjectId;
        });
        alert("已导入项目：" + (np ? np.name : ""));
        render();
      };
    }
    var np = document.getElementById("btn-new-project");
    if (np) {
      np.onclick = function () {
        var name = prompt("项目名称");
        if (!name || !name.trim()) return;
        var p = {
          id: uid(),
          name: name.trim(),
          archived: false,
          createdAt: new Date().toISOString(),
          owner: state.userName,
          members: [state.userName],
          pipelineStages: ["流程"],

  function bindAi() {
    var daily = function () {
      var ts = state.tasks;
      var done = ts.filter(function (t) { return t.status === "done"; }).length;
      var bl = ts.filter(function (t) { return t.status === "blocked"; }).length;
      var el = document.getElementById("ai-daily");
      if (el) el.textContent = "任务 " + ts.length + " 条，完成 " + done + "，阻塞 " + bl + "。建议优先处理阻塞项。";
    };
    var dayplan = function () {
      var today = ymdFromDate(new Date());
      var cand = state.tasks.filter(function (t) {
        if (t.status === "done") return false;
        var dl = t.deadline && String(t.deadline).slice(0, 10);
        var st = t.startTime && String(t.startTime).slice(0, 10);
        return dl === today || st === today;
      });
      cand.sort(function (a, b) {
        var ra = taskPriorityRank(a.priority);
        var rb = taskPriorityRank(b.priority);
        if (ra !== rb) return ra - rb;
        var da = a.deadline || "";
        var db = b.deadline || "";
        return da.localeCompare(db);
      });
      var el = document.getElementById("ai-day-plan");
      if (!el) return;
      if (!cand.length) {
        el.textContent = "今日暂无「开始」或「截止」落在今天的未完成任务。可适当安排预备、联调或回顾。";
        return;
      }
      var lines = ["【今日计划】（本地规则：优先级与 deadline 先后）"];
      for (var ii = 0; ii < cand.length; ii++) {
        var ct = cand[ii];
        var dl = ct.deadline && String(ct.deadline).slice(0, 10);
        var mark = dl === today ? "截止今日" : "开始今日";
        lines.push(
          String(ii + 1) + ". 「" + ct.title + "」 — " + mark + " · " + (ct.priority || "P2")
        );
      }
      lines.push("建议：优先 P0/P1 且「截止今日」；大块任务拆成可验收步骤。");
      el.textContent = lines.join("\n");
    };
    var weekplan = function () {
      var mon = mondayOfThisWeekNatural();
      var dayNames = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
      var lines = ["【本周计划】（自然周 · 仅统计未完成任务有 deadline 的日期）"];
      var total = 0;
      for (var di = 0; di < 7; di++) {
        var dtx = new Date(mon);
        dtx.setDate(mon.getDate() + di);
        var ds = ymdFromDate(dtx);
        var due = state.tasks.filter(function (t) {
          if (t.status === "done") return false;
          return t.deadline && String(t.deadline).slice(0, 10) === ds;
        });
        due.sort(function (a, b) {
          return taskPriorityRank(a.priority) - taskPriorityRank(b.priority);
        });
        if (due.length) {
          lines.push("• " + dayNames[di] + " (" + ds + ") — " + due.length + " 项截止");
          for (var jj = 0; jj < due.length; jj++) {
            lines.push("  - " + due[jj].title + " [" + (due[jj].priority || "P2") + "]");
          }
          total += due.length;
        }
      }
      if (total === 0) lines.push("本周暂无带 deadline 的未完成任务。");
      else lines.push("提示：与「日程」页切换周视图核对本周 DDL 密度。");
      var el = document.getElementById("ai-week-plan");
      if (el) el.textContent = lines.join("\n");
    };
    var risk = function () {
      var el = document.getElementById("ai-risk");
      var overdue = state.tasks.filter(function (t) {
        return t.deadline && t.status !== "done" && new Date(t.deadline) < new Date();
      }).length;
      if (el) el.textContent = "延期任务约 " + overdue + " 条；请关注 P0 且未完成任务。";
    };
    var weekreport = function () {
      var el = document.getElementById("ai-week-report");
      if (el) el.textContent = buildWeeklyWorkReportText();
    };
    var btns = appEl.querySelectorAll("[data-ai]");
    for (var i = 0; i < btns.length; i++) {
      btns[i].onclick = function () {
        var k = this.getAttribute("data-ai");
        if (k === "daily") daily();
        if (k === "dayplan") dayplan();
        if (k === "weekplan") weekplan();
        if (k === "risk") risk();
        if (k === "weekreport") weekreport();
        if (k === "split") {
          var title = (document.getElementById("ai-title") && document.getElementById("ai-title").value) || "";
          var pre = document.getElementById("ai-split");
          if (!title.trim()) {
            if (pre) pre.textContent = "请先输入标题";
            return;
          }
          if (pre) {
            pre.textContent =
              "建议子任务：\n1) " +
              title +
              " — 需求澄清\n2) 方案与排期\n3) 开发 / 联调\n4) 验收与上线\n（本地模拟，非真实大模型）";
          }
        }
      };
    }
  }

  /** 流程图节点较多时避免每次 renderWorkspaceBody 对每节点绑 onclick，改为 appEl 上委托一次 */
  function installFlowInteractionDelegation() {
    if (__flowClickDelegationInstalled || !appEl) return;
    __flowClickDelegationInstalled = true;
    appEl.addEventListener(
      "click",
      function (e) {
        var tgt = e.target;
        if (!tgt || !tgt.closest) return;
        var actBtn = tgt.closest(".flow-node-act[data-flow-act][data-task-id]");
        if (actBtn && appEl.contains(actBtn)) {
          e.stopPropagation();
          e.preventDefault();
          var act = actBtn.getAttribute("data-flow-act");
          var id = actBtn.getAttribute("data-task-id");
          var task = state.tasks.find(function (x) {
            return x.id === id;
          });
          if (!task) return;
          if (act === "edit") {
            openTaskEditor(task, task.projectId);
            return;
          }
          if (act === "del") {
            if (!confirm("确定删除「" + (task.title || "") + "」？将同时删除其下所有子任务。")) return;
            deleteTaskCascade(task);
            save(state);
            render();
            return;
          }
          if (act === "ins") {
            var fnWrap = actBtn.closest(".flow-node");
            var colRaw = fnWrap && fnWrap.getAttribute ? fnWrap.getAttribute("data-flow-column-stage") : null;
            var insOpts = {};
            if (colRaw !== null && colRaw !== "") insOpts.fromColumnStage = colRaw;
            openTaskInsertSibling(task, insOpts);
            return;
          }
          if (act === "child") {
            var fnW2 = actBtn.closest(".flow-node");
            var colR2 = fnW2 && fnW2.getAttribute ? fnW2.getAttribute("data-flow-column-stage") : null;
            var chOpts = {};
            if (colR2 !== null && colR2 !== "") chOpts.fromColumnStage = colR2;
            openTaskInsertChild(task, chOpts);
            return;
          }
          return;
        }
        var openEl = tgt.closest("[data-flow-open]");
        if (openEl && appEl.contains(openEl)) {
          if (tgt.closest && tgt.closest(".flow-node-actions")) return;
          var oid = openEl.getAttribute("data-flow-open");
          var t = state.tasks.find(function (x) {
            return x.id === oid;
          });
          if (t) openTaskDrawer(t);
        }
      },
      false
    );
  }

        '<div class="row"><label>状态</label><select id="tf-status">' + stopt + "</select></div>" +
        '<div class="row"><label>优先级</label><select id="tf-prio">' + prioopt + "</select></div>" +
        '<div class="row"><label>负责人（账号ID）</label><input class="input" id="tf-asg" placeholder="例如：zhangsan" value="' + esc(t.assignee) + '" /></div>' +
        '<div class="row"><label>协作人（账号ID）</label><input class="input" id="tf-col" placeholder="逗号分隔，如 lisi,wangwu" value="' + esc(t.collaborators) + '" /></div>' +
        '<div class="row"><label>创建人</label><input class="input" id="tf-cby" value="' + esc(t.createdBy) + '" /></div>' +
        parRow +
        '<div class="row"><label>开始</label><input class="input" id="tf-start" type="date" value="' + esc(String(t.startTime || "").slice(0, 10)) + '" /></div>' +
        '<div class="row"><label>截止</label><input class="input" id="tf-due" type="date" value="' + esc(String(t.deadline || "").slice(0, 10)) + '" /></div>' +
        '<div class="row"><label>预计工时</label><input class="input" id="tf-est" type="number" step="0.5" value="' + esc(t.estimatedHours) + '" /></div>' +
        '<div class="row"><label>实际工时</label><input class="input" id="tf-act" type="number" step="0.5" value="' + esc(t.actualHours) + '" /></div>' +
        '<div class="row"><label>标签</label><input class="input" id="tf-tags" value="' + esc(t.tags) + '" /></div>' +
        '<div class="flex" style="margin-top:0.75rem;justify-content:flex-end">' +
        '<button type="button" class="btn" id="tf-cancel">取消</button> ' +
        '<button type="button" class="btn btn-primary" id="tf-save">保存</button></div>'
    );
    document.getElementById("tf-cancel").onclick = closeModal;
    document.getElementById("tf-save").onclick = function () {
      t.title = document.getElementById("tf-title").value.trim() || "未命名";
      t.description = document.getElementById("tf-desc").value;
      if (ch) {
        t.pipelineStage = 0;
        var parch = document.getElementById("tf-par");
        var pida = parch ? parch.value : "";
        t.parentId = pida || null;
        if (!existing) {
          if (t.parentId) {
            t.chainOrder = undefined;
          } else {
            if (t.chainOrder == null || t.chainOrder === "") {
              t.chainOrder = nextChainOrder(projectId);
            }
            renumberChainAfterDelete(projectId);
          }
        }
      } else {
        t.pipelineStage = 0;
        var parel = document.getElementById("tf-par");
        var pid = parel ? parel.value : "";
        t.parentId = pid || null;
        if (!existing && opts.parallelWithTaskId) {
          var baseTask = state.tasks.find(function (x) {
            return x.id === opts.parallelWithTaskId && x.projectId === projectId;
          });
          if (baseTask && (baseTask.parentId || null) === (t.parentId || null)) {
            var pg = baseTask.parallelGroup ? String(baseTask.parallelGroup) : String(baseTask.id);
            baseTask.parallelGroup = pg;
            t.parallelGroup = pg;
          }
        }
        if (!existing && opts.insertAfterTaskId) {
          var lane = state.tasks
            .filter(function (x) {
              if (x.projectId !== projectId) return false;
              if ((x.parentId || null) !== (t.parentId || null)) return false;
              return true;
            })
            .sort(sortTasksByDeadlineFlow);
          var ids = lane.map(function (x) { return x.id; });
          var ai = ids.indexOf(opts.insertAfterTaskId);
          if (ai < 0) ai = ids.length - 1;
          ids.splice(ai + 1, 0, t.id);
          for (var oi = 0; oi < ids.length; oi++) {
            if (ids[oi] === t.id) {
              t.flowOrder = oi;
              continue;
            }
            var ot = state.tasks.find(function (x) { return x.id === ids[oi]; });
            if (ot) ot.flowOrder = oi;
          }
        }
      }
      t.status = document.getElementById("tf-status").value;
      t.priority = document.getElementById("tf-prio").value;
      t.assignee = document.getElementById("tf-asg").value;
      t.collaborators = document.getElementById("tf-col").value;
      t.createdBy = document.getElementById("tf-cby").value;
      t.startTime = document.getElementById("tf-start").value;
      t.deadline = document.getElementById("tf-due").value;
      var est = parseFloat(document.getElementById("tf-est").value);
      var act = parseFloat(document.getElementById("tf-act").value);
      t.estimatedHours = isNaN(est) ? "" : est;
      t.actualHours = isNaN(act) ? "" : act;
      t.tags = document.getElementById("tf-tags").value;
      if (!existing) state.tasks.push(t);
      closeModal();
      render();
    };
  }

  function openTaskDrawer(t) {
    var projForTask = state.projects.find(function (x) {
      return x.id === t.projectId;
    });
    var relLines = state.relations
      .filter(function (r) {
        return r.fromId === t.id || r.toId === t.id;
      })
      .map(function (r) {
        var other = r.fromId === t.id ? r.toId : r.fromId;
        var ot = state.tasks.find(function (x) { return x.id === other; });
        return r.kind + " → " + (ot ? ot.title : other);
      });
    var coms = state.comments.filter(function (c) {
      return c.taskId === t.id;
    });
    var chtml = "";
    for (var i = 0; i < coms.length; i++) {
      var c = coms[i];
      chtml +=
        '<div class="card" style="padding:0.45rem 0.55rem;margin-bottom:0.35rem;font-size:12px">' +
        "<strong>" + esc(c.author) + "</strong> · " + esc(c.body) + "</div>";
    }
    var stageRowLabel = projForTask && isChainProject(projForTask) ? "串联顺序" : "任务顺序";
    var insSibLabel = projForTask && isChainProject(projForTask) && !t.parentId ? "下方插入" : "插入并列";
    var siblingBtn =
      '<button type="button" class="btn btn-sm" id="nv-insert-sibling" title="新建同级任务">' + insSibLabel + "</button>";
    var childBtn = '<button type="button" class="btn btn-sm" id="nv-child">＋ 新建子任务</button>';
    var ddlStr = t.deadline ? esc(String(t.deadline).slice(0, 10)) : "—";
    var startStr = t.startTime ? esc(String(t.startTime).slice(0, 10)) : "—";
    var estStr = t.estimatedHours != null && t.estimatedHours !== "" ? esc(String(t.estimatedHours)) + " h" : "—";
    var actStr = t.actualHours != null && t.actualHours !== "" ? esc(String(t.actualHours)) + " h" : "—";
    openModal(
      "<h3>" + esc(t.title) + "</h3>" +
        '<p class="muted" style="white-space:pre-wrap;max-height:160px;overflow:auto">' + esc(t.description || "无描述") + "</p>" +
        '<div class="row"><label>' +
        esc(stageRowLabel) +
        '</label><div>' +
        esc(projForTask ? stageLabel(projForTask, t) : "—") +
        "</div></div>" +
        '<div class="row"><label>状态</label><span class="' + badgeClass(t.status) + '">' + esc(STATUS_LABEL[t.status] || t.status) + "</span></div>" +
        '<div class="row"><label>优先级</label><span class="' + prioClass(t.priority) + '">' + esc(t.priority) + "</span></div>" +
        '<div class="row"><label>负责人</label><div>' + esc(t.assignee || "—") + "</div></div>" +
        '<div class="row"><label>协作人</label><div>' + esc(t.collaborators || "—") + "</div></div>" +
        '<div class="row"><label>创建人</label><div>' + esc(t.createdBy || "—") + "</div></div>" +
        '<div class="row"><label>截止日期（DDL）</label><div>' + ddlStr + "</div></div>" +
        '<div class="row"><label>开始时间</label><div>' + startStr + "</div></div>" +
        '<div class="row"><label>预计工时</label><div>' + estStr + "</div></div>" +
        '<div class="row"><label>实际工时</label><div>' + actStr + "</div></div>" +
        '<div class="row"><label>标签</label><div>' + esc(t.tags || "—") + "</div></div>" +
        '<div class="row"><label>关系</label><div class="muted" style="font-size:12px">' + (relLines.length ? esc(relLines.join("；")) : "无") + "</div></div>" +
        "<h4 style=\"margin:0.75rem 0 0.35rem;font-size:0.9rem\">评论</h4>" +
        chtml +
        '<input class="input" id="nv-com" placeholder="写评论，可 @用户名" style="margin-top:0.5rem" />' +
        '<div class="flex" style="margin-top:0.5rem;justify-content:space-between;align-items:center">' +
        '<div class="flex" style="gap:0.35rem;flex-wrap:wrap">' +
        siblingBtn +
        childBtn +
        '<button type="button" class="btn btn-sm" id="nv-del">删除</button></div>' +
        '<div class="flex" style="gap:0.35rem">' +
        '<button type="button" class="btn" id="nv-close">关闭</button> ' +
        '<button type="button" class="btn btn-primary" id="nv-edit">编辑</button> ' +
        '<button type="button" class="btn btn-primary" id="nv-send">发评论</button></div></div>'
    );
    document.getElementById("nv-close").onclick = closeModal;
    var nvChild = document.getElementById("nv-child");
    if (nvChild) {
      nvChild.onclick = function () {
        closeModal();
        if (projForTask && !isChainProject(projForTask)) {
          openTaskEditor(null, t.projectId, t.id, { pipelineStage: normalizePipelineStage(t, projForTask) });
        } else {
          openTaskEditor(null, t.projectId, t.id);
        }
      };
    }
    document.getElementById("nv-edit").onclick = function () {
      closeModal();
      openTaskEditor(t, t.projectId);
    };
    document.getElementById("nv-del").onclick = function () {
      if (!confirm("确定删除？将同时删除其下所有子任务。")) return;
      deleteTaskCascade(t);
      save(state);
      closeModal();
      render();
    };
    var nvIns = document.getElementById("nv-insert-sibling");
    if (nvIns) {
      nvIns.onclick = function () {
        closeModal();
        openTaskInsertSibling(t);
      };
    }
    document.getElementById("nv-send").onclick = function () {
      var body = (document.getElementById("nv-com") && document.getElementById("nv-com").value) || "";
      if (!body.trim()) return;
      var at = [];
      var re = /@([\u4e00-\u9fa5\w.\-]+)/g;
      var m;
      while ((m = re.exec(body))) {
        at.push(m[1]);
      }
      state.comments.push({
        id: uid(),
        taskId: t.id,
        author: state.userName,
        body: body.trim(),
        parentId: null,
        at: at,
        createdAt: new Date().toISOString(),
      });
      closeModal();
      render();
      setTimeout(function () {
        var nt = state.tasks.find(function (x) {
          return x.id === t.id;
        });
        if (nt) openTaskDrawer(nt);
      }, 0);
    };
  }

  installFlowInteractionDelegation();
  bootstrap();
})();
  </script>
</body>
</html>
